<!DOCTYPE html>
<html lang="az">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Glidox Shop | Canlı Dəstək</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root { --primary: #ff4655; --bg-dark: #0a0a0a; --card-bg: #161616; --text-dim: #a0a0a0; }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background-color: var(--bg-dark); color: #fff; font-family: 'Poppins', sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; overflow: hidden; }

        /* Giriş Ekranı */
        #login-screen { background: var(--card-bg); padding: 40px; border-radius: 15px; text-align: center; border: 1px solid #222; width: 350px; }
        .input-field { width: 100%; padding: 12px; margin-bottom: 20px; background: #000; border: 1px solid #333; color: #fff; border-radius: 8px; text-align: center; outline: none; }
        .start-btn { width: 100%; padding: 12px; background: var(--primary); color: white; border: none; border-radius: 8px; font-family: 'Orbitron'; cursor: pointer; font-weight: bold; }

        /* Chat Ekranı */
        #chat-screen { display: none; width: 100%; height: 100vh; flex-direction: column; }
        .chat-header { padding: 20px 8%; background: #111; border-bottom: 1px solid #222; display: flex; justify-content: space-between; align-items: center; }
        .messages-area { flex-grow: 1; padding: 25px 8%; overflow-y: auto; display: flex; flex-direction: column; gap: 10px; background: #0d0d0d; }
        .msg { padding: 10px 16px; border-radius: 12px; font-size: 14px; max-width: 80%; }
        .msg.admin { background: #222; align-self: flex-start; border-bottom-left-radius: 2px; color: #00ccff; }
        .msg.me { background: var(--primary); align-self: flex-end; border-bottom-right-radius: 2px; }

        .input-area { padding: 20px 8%; background: #111; display: flex; gap: 10px; }
        #userInput { flex-grow: 1; background: #1a1a1a; border: 1px solid #333; padding: 12px; border-radius: 8px; color: #fff; outline: none; }
        .send-btn { background: var(--primary); border: none; padding: 0 25px; border-radius: 8px; color: #fff; cursor: pointer; font-weight: bold; }
    </style>
</head>
<body>

    <div id="login-screen">
        <h2 style="font-family: 'Orbitron'; color: var(--primary); margin-bottom: 15px;">GİRİŞ</h2>
        <input type="text" id="userNameInput" class="input-field" placeholder="@Adınızı yazın (Məs: @Polad)">
        <button class="start-btn" onclick="startChat()">BAŞLA</button>
    </div>

    <div id="chat-screen">
        <div class="chat-header">
            <h3 id="display-name" style="font-family: 'Orbitron'; font-size: 14px;">Çat</h3>
            <a href="index.html" style="color: #666; text-decoration: none; font-size: 12px;">ÇIXIŞ</a>
        </div>
        <div class="messages-area" id="msgBox"></div>
        <div class="input-area">
            <input type="text" id="userInput" placeholder="Mesaj yazın...">
            <button class="send-btn" onclick="send()">GÖNDƏR</button>
        </div>
    </div>

    <script>
        const botToken = "BOT_TOKENINI_BURA_YAZ"; 
        const chatId = "SENIN_CHAT_ID_BURA_YAZ";
        let clientName = "";
        let lastUpdateId = 0;

        function startChat() {
            const name = document.getElementById('userNameInput').value.trim();
            if(!name.startsWith('@')) { alert("Ad mütləq @ işarəsi ilə başlamalıdır! (Məs: @Polad)"); return; }
            clientName = name;
            document.getElementById('login-screen').style.display = 'none';
            document.getElementById('chat-screen').style.display = 'flex';
            document.getElementById('display-name').innerText = "İstifadəçi: " + clientName;
            
            // Cavabları yoxlamağa başla
            setInterval(checkResponses, 3000); 
        }

        function send() {
            const input = document.getElementById('userInput');
            const box = document.getElementById('msgBox');
            if(input.value.trim() === "") return;

            const userMsg = document.createElement('div');
            userMsg.className = "msg me";
            userMsg.innerText = input.value;
            box.appendChild(userMsg);

            // Telegrama göndər
            const text = `👤 ${clientName} yazır:\n${input.value}`;
            fetch(`https://api.telegram.org/bot${botToken}/sendMessage?chat_id=${chatId}&text=${encodeURIComponent(text)}`);

            input.value = "";
            box.scrollTop = box.scrollHeight;
        }

        async function checkResponses() {
            try {
                const response = await fetch(`https://api.telegram.org/bot${botToken}/getUpdates?offset=${lastUpdateId + 1}`);
                const data = await response.json();

                if (data.result && data.result.length > 0) {
                    data.result.forEach(update => {
                        lastUpdateId = update.update_id;
                        const messageText = update.message.text;

                        // Əgər mesaj sənin yazdığın adla başlayırsa (@Polad salam)
                        if (messageText.startsWith(clientName)) {
                            const cleanMsg = messageText.replace(clientName, "").trim();
                            displayAdminMessage(cleanMsg);
                        }
                    });
                }
            } catch (e) { console.error("Xəta:", e); }
        }

        function displayAdminMessage(text) {
            const box = document.getElementById('msgBox');
            const adminMsg = document.createElement('div');
            adminMsg.className = "msg admin";
            adminMsg.innerText = "Admin: " + text;
            box.appendChild(adminMsg);
            box.scrollTop = box.scrollHeight;
        }
    </script>
</body>
</html>

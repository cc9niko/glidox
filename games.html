<!DOCTYPE html>
<html lang="az">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Glidox Shop | Oyunlar və Xidmətlər - Chromium</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #ff4655;
            --bg-dark: #0a0a0a;
            --card-bg: #111111;
            --transition: 0.3s ease;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background-color: var(--bg-dark);
            color: #ffffff;
            font-family: 'Poppins', sans-serif;
            opacity: 0;
            transition: opacity 0.5s ease;
            font-size: 13px;
        }

        body.loaded { opacity: 1; }

        header {
            background-color: #0d0d0d;
            padding: 10px 10%;
            display: flex; justify-content: space-between; align-items: center;
            border-bottom: 1px solid #222;
            position: sticky; top: 0; z-index: 1000;
        }

        .logo {
            font-family: 'Orbitron', sans-serif;
            font-size: 22px; font-weight: bold; color: var(--primary);
            text-decoration: none; letter-spacing: 2px; text-transform: uppercase;
        }

        nav ul { list-style: none; display: flex; gap: 20px; }
        nav ul li a { color: #fff; text-decoration: none; font-family: 'Poppins'; text-transform: uppercase; font-size: 11px; }

        .container {
            max-width: 1100px;
            margin: 40px auto;
            padding: 0 20px;
        }

        .games-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 25px;
        }

        .game-card {
            background: var(--card-bg);
            border-radius: 8px;
            overflow: hidden;
            border: 1px solid #222;
            text-decoration: none;
            color: white;
            transition: var(--transition);
            display: flex;
            flex-direction: column;
        }

        .game-card:hover { transform: translateY(-3px); border-color: var(--primary); }

        /* Şəkillərin ölçüsünü sabitləmək üçün konteyner */
        .img-container {
            width: 100%;
            height: 200px;
            overflow: hidden;
            background-color: #000; /* Şəkil yüklənmədikdə qara fon */
        }

        .game-img {
            width: 100%;
            height: 100%;
            object-fit: cover; /* Şəkli qutunun içinə yerləşdirir */
            transition: var(--transition);
        }

        .game-card:hover .game-img { transform: scale(1.05); }

        .game-info {
            padding: 15px;
            text-align: center;
            flex-grow: 1; /* Mətni aşağıya doğru genişləndirir */
            display: flex;
            flex-direction: column;
            justify-content: space-between;
        }

        .game-info h3 {
            font-family: 'Orbitron', sans-serif;
            font-size: 16px;
            margin-bottom: 5px;
            text-transform: uppercase;
        }

        .game-info p {
            font-size: 11px;
            color: #888;
            margin-bottom: 10px;
        }

        .badge {
            display: inline-block;
            padding: 4px 12px;
            border-radius: 15px;
            font-size: 10px;
            font-weight: bold;
            color: var(--primary);
            border: 1px solid var(--primary);
            align-self: center;
        }

        footer { text-align: center; padding: 30px; color: #444; font-size: 11px; border-top: 1px solid #222; margin-top: 40px; }

    </style>
</head>
<body class="loaded">

    <header>
        <a href="index.html" class="logo">GLIDOX</a>
        <nav>
            <ul>

                <li><a href="destek.html">DƏSTƏK</a></li>
            </ul>
        </nav>
    </header>

    <div class="container">
        <div class="games-grid">
            
            <a href="pubg.html" class="game-card">
                <div class="img-container">
                    <img src="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcRU2HFapnOWqtN4uzRUHXkdVWir06EQ6DJ64QCPg_oqXarptw3k6xsSdcoHCDoUow3B0mWXovDleFYB1zJwsvcVVYqivokdYKBHf7Hoj_k&s=10" alt="PUBG" class="game-img">
                </div>
                <div class="game-info">
                    <h3>PUBG MOBILE</h3>
                    <p>UC yükləmələri və paketlər</p>
                    <span class="badge">Sürətli Çatdırılma</span>
                </div>
            </a>

            <a href="freefire.html" class="game-card">
                <div class="img-container">
                    <img src="https://a-static.besthdwallpaper.com/mission-landscape-map-garena-free-fire-video-game-wallpaper-2400x1350-73457_50.jpg" alt="Free Fire" class="game-img">
                </div>
                <div class="game-info">
                    <h3>FREE FIRE</h3>
                    <p>Almaz (Diamond) yükləmələri</p>
                    <span class="badge">Sürətli</span>
                </div>
            </a>

            <a href="roblox.html" class="game-card">
                <div class="img-container">
                    <img src="https://images.tynker.com/blog/wp-content/uploads/20250401220809/robloxxjpg-1.jpg" alt="Roblox" class="game-img">
                </div>
                <div class="game-info">
                    <h3>ROBLOX</h3>
                    <p>Robux paketləri və yükləmə</p>

            <a href="valorant.html" class="game-card">
                <div class="img-container">
                    <img src="https://www.riotgames.com/darkroom/1440/8d5c497da1c2eeec8cffa99b01abc64b:5329ca773963a5b739e98e715957ab39/ps-f2p-val-console-launch-16x9.jpg" alt="Valorant" class="game-img">
                </div>
                <div class="game-info">

        </div>
    </div>

    <footer>&copy; 2026 GLIDOX SHOP - Bütün hüquqlar qorunur</footer>

</body>
</html>

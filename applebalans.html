<!DOCTYPE html>
<html lang="az">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Glidox Shop | Apple App Store Balans</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root { --apple-blue: #0071e3; --bg-dark: #000; --card-bg: #1d1d1f; --text-gray: #86868b; }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: var(--bg-dark); color: #fff; font-family: 'Poppins', sans-serif; opacity: 0; transition: 0.6s; }
        body.loaded { opacity: 1; }
        header { background: rgba(0, 0, 0, 0.8); backdrop-filter: blur(20px); padding: 15px 8%; display: flex; justify-content: space-between; border-bottom: 1px solid #333; position: sticky; top: 0; z-index: 1000; }
        .logo { font-family: 'Orbitron'; font-size: 22px; color: #fff; text-decoration: none; letter-spacing: 2px; }
        .hero { text-align: center; padding: 80px 20px; background: radial-gradient(circle at center, #2c2c2e 0%, #000 100%); }
        .hero img { width: 60px; margin-bottom: 20px; filter: invert(1); }
        .container { max-width: 1000px; margin: 40px auto; padding: 0 20px; }
        .price-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(220px, 1fr)); gap: 20px; }
        .price-card { background: var(--card-bg); padding: 30px; border-radius: 18px; text-align: center; transition: 0.4s; cursor: pointer; border: 1px solid transparent; }
        .price-card:hover { transform: scale(1.03); border-color: #555; }
        .price-card.active { border-color: var(--apple-blue); background: #252527; }
        .price-tag { color: var(--apple-blue); font-weight: 600; font-size: 22px; }
        .buy-btn { display: block; width: 100%; max-width: 280px; margin: 60px auto; padding: 16px; background: var(--apple-blue); color: #fff; text-decoration: none; text-align: center; border-radius: 30px; font-weight: 600; border: none; cursor: pointer; }
    </style>
</head>
<body class="loaded">
    <header>
        <a href="index.html" class="logo">GLIDOX</a>
        <a href="index.html" style="color: #fff; text-decoration: none; font-size: 13px;">Geri qayt</a>
    </header>

    <div class="hero">
        <img src="https://upload.wikimedia.org/wikipedia/commons/f/fa/Apple_logo_black.svg" alt="Apple">
        <h1>App Store & iTunes</h1>
        <p>Balansınızı anında artırın</p>
    </div>

    <div class="container">
        <div class="price-grid">
            <div class="price-card" onclick="select(this, '2$ Balans')">
                <span style="font-size: 28px; font-weight: 600; display: block;">2$</span>
                <span style="color: var(--text-gray); font-size: 14px; display: block; margin-bottom: 15px;">APPLE GIFT CARD</span>
                <span class="price-tag" id="price-apple2">Yüklənir...</span>
            </div>
            <div class="price-card" onclick="select(this, '4$ Balans')">
                <span style="font-size: 28px; font-weight: 600; display: block;">4$</span>
                <span style="color: var(--text-gray); font-size: 14px; display: block; margin-bottom: 15px;">APPLE GIFT CARD</span>
                <span class="price-tag" id="price-apple4">Yüklənir...</span>
            </div>
            <div class="price-card" onclick="select(this, '5$ Balans')">
                <span style="font-size: 28px; font-weight: 600; display: block;">5$</span>
                <span style="color: var(--text-gray); font-size: 14px; display: block; margin-bottom: 15px;">APPLE GIFT CARD</span>
                <span class="price-tag" id="price-apple5">Yüklənir...</span>
            </div>
            <div class="price-card" onclick="select(this, '10$ Balans')">
                <span style="font-size: 28px; font-weight: 600; display: block;">10$</span>
                <span style="color: var(--text-gray); font-size: 14px; display: block; margin-bottom: 15px;">APPLE GIFT CARD</span>
                <span class="price-tag" id="price-apple10">Yüklənir...</span>
            </div>
        </div>
        <button class="buy-btn" onclick="alert('Tezliklə!')">SİFARİŞ ET</button>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getDatabase, ref, onValue } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSy...", 
            databaseURL: "https://glidoxshop-default-rtdb.europe-west1.firebasedatabase.app",
            projectId: "glidoxshop",
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        // DİQQƏT: Firebase-də qovluq adın "applebalans" olduğu üçün buranı düzəltdim
        const appleItems = [
            { id: 'price-apple2', key: '2_USD' },
            { id: 'price-apple4', key: '4_USD' },
            { id: 'price-apple5', key: '5_USD' },
            { id: 'price-apple10', key: '10_USD' }
        ];

        appleItems.forEach(item => {
            // YOLU DÜZƏLTDİM: Artıq "applebalans/" qovluğuna baxır
            onValue(ref(db, 'applebalans/' + item.key), (snap) => {
                const val = snap.exists() ? snap.val() : "N/A";
                document.getElementById(item.id).innerText = val + " AZN";
            });
        });
    </script>
</body>
</html>

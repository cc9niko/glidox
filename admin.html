<!DOCTYPE html>
<html lang="az">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Glidox Titan v70 | Ultimate</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        :root {
            --bg-ultra: #020204; --bg-panel: #0a0a0f; --primary: #00f2ff;
            --owner-gold: #ffaa00; --danger: #ff3e3e; --border: rgba(255, 255, 255, 0.05);
            --sidebar-w: 260px;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: var(--bg-ultra); color: #888b94; font-family: 'Outfit', sans-serif; height: 100vh; overflow: hidden; display: flex; }
        #gatekeeper { position: fixed; inset: 0; z-index: 10000; background: #020204; display: flex; align-items: center; justify-content: center; }
        .login-frame { background: var(--bg-panel); border: 1px solid var(--border); padding: 40px; border-radius: 30px; width: 380px; text-align: center; }
        .f-group input { width: 100%; background: #000; border: 1px solid var(--border); padding: 12px; border-radius: 10px; color: #fff; margin-top: 10px; outline: none; }
        #titan-root { display: none; width: 100%; height: 100%; }
        aside { width: var(--sidebar-w); background: var(--bg-panel); border-right: 1px solid var(--border); padding: 30px 15px; display: flex; flex-direction: column; }
        main { flex: 1; overflow-y: auto; padding: 30px; }
        .nav-link { padding: 14px 20px; border-radius: 12px; cursor: pointer; display: flex; align-items: center; gap: 12px; font-weight: 600; margin-bottom: 5px; }
        .nav-link.active { background: var(--primary); color: #000; }
        .glass-panel { background: var(--bg-panel); border: 1px solid var(--border); border-radius: 25px; padding: 25px; margin-bottom: 25px; }
        input, select, textarea { width: 100%; background: #000; border: 1px solid #222; color: #fff; padding: 12px; border-radius: 10px; margin-bottom: 10px; outline: none; }
        .price-box { background: rgba(255,255,255,0.02); padding: 10px; border-radius: 15px; margin-bottom: 8px; display: flex; align-items: center; gap: 10px; border: 1px solid var(--border); }
        .price-box input { margin-bottom: 0; border: 1px solid #1a1a1a; }
        .p-key { flex: 2; color: var(--primary); font-weight: bold; }
        .p-val { flex: 1; text-align: center; }
        .btn-del { background: none; border: none; color: var(--danger); cursor: pointer; padding: 5px 10px; }
        .btn-main { width: 100%; padding: 15px; border-radius: 12px; border: none; background: var(--primary); color: #000; font-weight: 900; cursor: pointer; }
        .view { display: none; } .view.active { display: block; }
        #btn-logout { margin-top: auto; color: var(--danger); background: none; border: 1px solid var(--danger); padding: 10px; border-radius: 10px; cursor: pointer; }
    </style>
</head>
<body>

    <div id="gatekeeper">
        <div class="login-frame">
            <h2 style="color:#fff; font-weight:900;">TITAN v70</h2>
            <div class="f-group">
                <input type="email" id="f-email" placeholder="Admin Email">
                <input type="password" id="f-pass" placeholder="Şifrə">
            </div>
            <button class="btn-main" id="btn-login-trigger" style="margin-top:20px;">GİRİŞ</button>
            <p id="auth-err" style="color:var(--danger); font-size:11px; margin-top:10px;"></p>
        </div>
    </div>

    <div id="titan-root">
        <aside>
            <h3 style="color:#fff; margin-bottom:30px;"><i class="fa-solid fa-bolt" style="color:var(--primary)"></i> GLIDOX</h3>
            <div class="nav-link active" data-target="pg-dash"><i class="fa-solid fa-house"></i> Dashboard</div>
            <div class="nav-link" data-target="pg-prices"><i class="fa-solid fa-tags"></i> Qiymətlər</div>
            <div class="nav-link" data-target="pg-ann"><i class="fa-solid fa-bullhorn"></i> Duyurular</div>
            <div id="owner-only-nav" style="display:none;">
                <div class="nav-link" data-target="pg-logs" style="color:var(--owner-gold)"><i class="fa-solid fa-database"></i> Loqlar</div>
            </div>
            <button id="btn-logout">ÇIXIŞ</button>
        </aside>

        <main>
            <div id="pg-dash" class="view active">
                <div class="glass-panel">
                    <h2 id="welcome-msg" style="color:#fff;">Sistem Aktivdir</h2>
                    <p id="role-text" style="color:var(--primary); font-weight:900;"></p>
                </div>
            </div>

            <div id="pg-prices" class="view">
                <div class="glass-panel">
                    <h3>Qiymət Redaktoru</h3>
                    <select id="game-select">
                        <option value="">Oyun seçin...</option>
                        <option value="roblox">Roblox</option>
                        <option value="pubg">PUBG Mobile</option>
                        <option value="steambalans">Steam Balans</option>
                        <option value="mlbb">Mobile Legends</option>
                        <option value="valorant">Valorant</option>
                        <option value="freefire">Free Fire</option>
                    </select>
                    
                    <div id="price-fields-container"></div>
                    
                    <div id="new-package-area" style="display:none; margin-top:20px; border-top:1px solid var(--border); padding-top:20px;">
                        <p style="font-size:12px; margin-bottom:10px;">+ Yeni Paket Əlavə Et</p>
                        <div class="price-box" style="border: 1px solid var(--primary);">
                            <input type="text" id="new-p-key" placeholder="Paket adı (məs: 500_UC)">
                            <input type="text" id="new-p-val" placeholder="Qiymət">
                        </div>
                    </div>

                    <button class="btn-main" id="btn-save-prices" style="display:none; margin-top:20px;">DƏYİŞİKLİKLƏRİ YADDA SAXLA</button>
                </div>
            </div>

            <div id="pg-ann" class="view">
                <div class="glass-panel">
                    <h3>Duyuru Sistemi</h3>
                    <textarea id="ann-text" rows="5" placeholder="Sayt mesajı..."></textarea>
                    <button class="btn-main" id="btn-save-ann">YAYIMLA</button>
                </div>
            </div>
        </main>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getAuth, signInWithEmailAndPassword, onAuthStateChanged, signOut, setPersistence, browserSessionPersistence } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
        import { getDatabase, ref, get, set, update } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCGsCjbwh6P7fHepdHrSyykpSAEmg0RmO8",
            databaseURL: "https://glidoxshop-default-rtdb.europe-west1.firebasedatabase.app",
            projectId: "glidoxshop"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getDatabase(app);

        const OWNER_UID = "dXDTZPPuVKaO1ecsO7UbCOXr15i1";
        const ADMINS = ["tMaqCC1AdoWUYgGTuay2eFKYMOF2", "NaH17on6YEO3bJzWXY16SZ02xtJ2", "Yr5c1JF2Z3T3amIoV3OJanFnFCR2"];

        setPersistence(auth, browserSessionPersistence);

        document.getElementById('btn-login-trigger').onclick = () => {
            signInWithEmailAndPassword(auth, document.getElementById('f-email').value, document.getElementById('f-pass').value)
            .catch(() => document.getElementById('auth-err').innerText = "Xəta: Giriş rədd edildi!");
        };

        onAuthStateChanged(auth, (user) => {
            if(user && (user.uid === OWNER_UID || ADMINS.includes(user.uid))) {
                document.getElementById('gatekeeper').style.display = 'none';
                document.getElementById('titan-root').style.display = 'flex';
                initPanel(user);
            } else if(user) { signOut(auth); }
        });

        function initPanel(user) {
            const isOwner = user.uid === OWNER_UID;
            document.getElementById('role-text').innerText = isOwner ? "STATUS: OWNER" : "STATUS: ADMIN";
            if(isOwner) document.getElementById('owner-only-nav').style.display = 'block';

            const container = document.getElementById('price-fields-container');
            const btnSave = document.getElementById('btn-save-prices');
            const newArea = document.getElementById('new-package-area');

            // AVTOMATİK QİYMƏT YÜKLƏMƏ
            document.getElementById('game-select').onchange = async (e) => {
                const game = e.target.value;
                if(!game) { container.innerHTML = ""; btnSave.style.display="none"; newArea.style.display="none"; return; }
                
                btnSave.style.display = "block";
                newArea.style.display = "block";
                container.innerHTML = "Yüklənir...";

                const snap = await get(ref(db, `prices/${game}`));
                const data = snap.val();
                container.innerHTML = "";

                if(data) {
                    Object.keys(data).sort().forEach(key => {
                        createPriceRow(key, data[key]);
                    });
                }
            };

            function createPriceRow(key, val) {
                const div = document.createElement('div');
                div.className = 'price-box';
                div.innerHTML = `
                    <input type="text" class="p-key" value="${key}" readonly>
                    <input type="text" class="p-val" value="${val}">
                    <button class="btn-del"><i class="fa-solid fa-trash"></i></button>
                `;
                div.querySelector('.btn-del').onclick = () => div.remove();
                container.appendChild(div);
            }

            // YADDA SAXLA (AVTOMATİK FORMATLAMA İLƏ)
            btnSave.onclick = async () => {
                const game = document.getElementById('game-select').value;
                const rows = container.querySelectorAll('.price-box');
                const newK = document.getElementById('new-p-key').value.trim();
                const newV = document.getElementById('new-p-val').value.trim();
                
                let updateData = {};
                
                // Mövcud sətirləri yığ
                rows.forEach(row => {
                    const k = row.querySelector('.p-key').value;
                    const v = row.querySelector('.p-val').value;
                    updateData[k] = isNaN(v) ? v : Number(v);
                });

                // Yeni paket sahəsi doludursa əlavə et
                if(newK && newV) {
                    updateData[newK] = isNaN(newV) ? newV : Number(newV);
                }

                await set(ref(db, `prices/${game}`), updateData);
                alert("Uğurla yeniləndi!");
                document.getElementById('new-p-key').value = "";
                document.getElementById('new-p-val').value = "";
                document.getElementById('game-select').dispatchEvent(new Event('change'));
            };

            document.getElementById('btn-save-ann').onclick = () => {
                update(ref(db, 'announcement'), { message: document.getElementById('ann-text').value, date: new Date().toLocaleString() })
                .then(() => alert("Duyuru yayımlandı!"));
            };
        }

        document.getElementById('btn-logout').onclick = () => signOut(auth).then(() => location.reload());
        document.querySelectorAll('.nav-link').forEach(link => {
            link.onclick = () => {
                document.querySelectorAll('.nav-link, .view').forEach(el => el.classList.remove('active'));
                link.classList.add('active');
                document.getElementById(link.dataset.target).classList.add('active');
            };
        });
    </script>
</body>
</html>

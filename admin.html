<!DOCTYPE html>
<html lang="az">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Glidox Titan v70 | Secure Master Control</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;900&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

    <style>
        :root {
            --bg-ultra: #020204;
            --bg-panel: #0a0a0f;
            --bg-card: #12121a;
            --primary: #00f2ff;
            --primary-glow: rgba(0, 242, 255, 0.15);
            --owner-gold: #ffaa00;
            --owner-glow: rgba(255, 170, 0, 0.2);
            --accent: var(--primary);
            --danger: #ff3e3e;
            --success: #00ff88;
            --text-h: #ffffff;
            --text-p: #888b94;
            --border: rgba(255, 255, 255, 0.05);
            --sidebar-w: 280px;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; outline: none; }
        
        body {
            background-color: var(--bg-ultra);
            color: var(--text-p);
            font-family: 'Outfit', sans-serif;
            height: 100vh;
            overflow: hidden;
            display: flex;
        }

        #gatekeeper {
            position: fixed; inset: 0; z-index: 10000;
            background: radial-gradient(circle at 50% 0%, #151525 0%, #020204 100%);
            display: flex; align-items: center; justify-content: center;
        }

        .login-frame {
            background: var(--bg-panel); border: 1px solid var(--border);
            padding: 60px; border-radius: 40px; width: 100%; max-width: 480px;
            box-shadow: 0 40px 100px rgba(0,0,0,0.8);
            text-align: center; position: relative; overflow: hidden;
        }

        .login-frame::before {
            content: ''; position: absolute; top: -50%; left: -50%; width: 200%; height: 200%;
            background: conic-gradient(transparent, transparent, transparent, var(--accent));
            animation: rotate 6s linear infinite; z-index: -1; opacity: 0.2;
        }
        @keyframes rotate { 100% { transform: rotate(360deg); } }

        .auth-icon {
            font-size: 40px; color: var(--accent); margin-bottom: 25px;
            filter: drop-shadow(0 0 10px var(--accent));
        }

        .login-frame h1 { font-weight: 900; color: #fff; font-size: 32px; margin-bottom: 8px; letter-spacing: -1px; }
        .login-frame p { margin-bottom: 40px; font-size: 14px; letter-spacing: 1px; }

        .f-group { text-align: left; margin-bottom: 25px; }
        .f-group label { display: block; font-size: 11px; text-transform: uppercase; font-weight: 800; color: var(--accent); margin-bottom: 10px; padding-left: 5px; }
        .f-group input {
            width: 100%; background: rgba(0,0,0,0.4); border: 1px solid var(--border);
            padding: 18px; border-radius: 16px; color: #fff; font-size: 15px; transition: 0.4s;
        }
        .f-group input:focus { border-color: var(--accent); background: rgba(255,255,255,0.02); box-shadow: 0 0 25px var(--primary-glow); }

        .btn-auth {
            width: 100%; padding: 20px; border-radius: 16px; border: none;
            background: var(--accent); color: #000; font-weight: 900; cursor: pointer;
            font-size: 16px; letter-spacing: 1px; transition: 0.4s;
        }
        .btn-auth:hover { transform: translateY(-3px); box-shadow: 0 15px 30px var(--primary-glow); }

        #titan-root { display: none; width: 100%; height: 100%; flex-direction: row; }

        aside {
            width: var(--sidebar-w); background: var(--bg-panel); border-right: 1px solid var(--border);
            display: flex; flex-direction: column; padding: 45px 25px;
        }

        .side-brand {
            font-size: 26px; font-weight: 900; color: #fff; margin-bottom: 60px;
            display: flex; align-items: center; gap: 15px;
        }
        .side-brand i { color: var(--accent); }

        .nav-link {
            padding: 18px 22px; border-radius: 20px; margin-bottom: 10px; cursor: pointer;
            display: flex; align-items: center; gap: 18px; font-weight: 600; font-size: 15px; transition: 0.3s;
        }
        .nav-link:hover { background: rgba(255,255,255,0.03); color: #fff; }
        .nav-link.active { background: var(--accent); color: #000; box-shadow: 0 12px 24px var(--primary-glow); }

        .nav-sep { margin: 35px 0 15px 15px; font-size: 10px; font-weight: 900; text-transform: uppercase; color: #3f3f46; letter-spacing: 2px; }

        main { flex: 1; display: flex; flex-direction: column; overflow-y: auto; background: var(--bg-ultra); }

        header {
            padding: 30px 50px; display: flex; justify-content: space-between; align-items: center;
            position: sticky; top: 0; background: rgba(2,2,4,0.8); backdrop-filter: blur(20px); z-index: 100;
        }

        .h-left h2 { color: #fff; font-size: 28px; font-weight: 900; }
        .user-status {
            display: flex; align-items: center; gap: 20px; background: var(--bg-card);
            padding: 10px 20px; border-radius: 60px; border: 1px solid var(--border);
        }
        .uid-tag { font-family: 'JetBrains Mono'; font-size: 11px; color: var(--accent); }

        .container { padding: 0 50px 100px 50px; animation: slideUp 0.6s ease; }
        @keyframes slideUp { from { opacity: 0; transform: translateY(30px); } to { opacity: 1; transform: translateY(0); } }

        .stat-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 25px; margin-bottom: 50px; }
        .card {
            background: var(--bg-card); border: 1px solid var(--border);
            padding: 35px; border-radius: 32px; transition: 0.4s;
        }
        .card:hover { border-color: var(--accent); transform: scale(1.02); }
        .card label { font-size: 11px; font-weight: 800; text-transform: uppercase; color: #52525b; }
        .card .val { font-size: 34px; font-weight: 900; color: #fff; margin-top: 15px; font-family: 'JetBrains Mono'; }

        .glass-panel {
            background: var(--bg-panel); border: 1px solid var(--border);
            border-radius: 40px; padding: 45px; margin-bottom: 40px;
        }

        .price-toolbar { display: flex; gap: 20px; margin-bottom: 40px; }
        .price-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(340px, 1fr)); gap: 25px; }
        .price-item {
            background: #000; border: 1px solid var(--border);
            padding: 30px; border-radius: 24px; display: flex; flex-direction: column; gap: 25px;
        }
        .p-info { display: flex; justify-content: space-between; align-items: center; }
        .p-info h4 { color: #fff; font-size: 17px; }
        .p-info span { color: var(--success); font-weight: 900; font-family: 'JetBrains Mono'; }
        
        .p-action { display: flex; gap: 12px; }
        .p-action input { flex: 1; background: #0c0c10; border: 1px solid #222; padding: 14px; border-radius: 12px; color: #fff; font-weight: 700; }
        .btn-save { padding: 0 25px; border-radius: 12px; border: none; background: var(--accent); color: #000; font-weight: 900; cursor: pointer; }

        .terminal {
            background: #000; border: 1px solid #111; border-radius: 25px;
            padding: 35px; height: 450px; overflow-y: auto; font-family: 'JetBrains Mono', monospace;
            font-size: 13px; line-height: 1.8;
        }
        .log-row { border-bottom: 1px solid rgba(255,255,255,0.03); padding: 8px 0; }
        .log-u { color: var(--accent); font-weight: 700; }

        #toast {
            position: fixed; bottom: 40px; right: 40px; z-index: 100000;
            background: #fff; color: #000; padding: 20px 40px; border-radius: 20px;
            font-weight: 900; box-shadow: 0 20px 50px rgba(0,0,0,0.5);
            display: none; animation: toastAnim 0.4s cubic-bezier(0.18, 0.89, 0.32, 1.28);
        }
        @keyframes toastAnim { from { transform: translateX(100%); } to { transform: translateX(0); } }

        .view { display: none; }
        .view.active { display: block; }

    </style>
</head>
<body>

    <div id="gatekeeper">
        <div class="login-frame">
            <div class="auth-icon"><i class="fa-solid fa-user-shield"></i></div>
            <h1>TITAN v70</h1>
            <p>GLIDOX SECURE CLOUD TERMINAL</p>
            
            <div class="f-group">
                <label>Admin Email</label>
                <input type="email" id="f-email" placeholder="email@glidox.com">
            </div>
            <div class="f-group">
                <label>Access Token</label>
                <input type="password" id="f-pass" placeholder="••••••••">
            </div>
            
            <button class="btn-auth" id="btn-login-trigger">SİSTEMƏ DAXİL OL</button>
            <div id="auth-err" style="color:var(--danger); font-size:12px; margin-top:15px; font-weight:700;"></div>
        </div>
    </div>

    <div id="titan-root">
        <aside>
            <div class="side-brand"><i class="fa-solid fa-atom"></i> TITAN<span>70</span></div>
            
            <div class="nav-sep">IDARƏETMƏ</div>
            <div class="nav-link active" data-target="pg-dash"><i class="fa-solid fa-house-chimney"></i> Dashboard</div>
            <div class="nav-link" data-target="pg-prices"><i class="fa-solid fa-credit-card"></i> Qiymət İdarəsi</div>
            <div class="nav-link" data-target="pg-ann"><i class="fa-solid fa-satellite-dish"></i> Duyuru Sistemi</div>
            
            <div class="nav-sep owner-panel" style="display:none;">SİSTEM SAHİBİ</div>
            <div class="nav-link owner-panel" style="display:none;" data-target="pg-logs"><i class="fa-solid fa-microchip"></i> Sistem Loqları</div>

            <div style="margin-top: auto;">
                <button onclick="location.reload()" style="width:100%; padding:18px; border-radius:16px; background:rgba(255,62,62,0.1); color:var(--danger); border:1px solid var(--danger); font-weight:900; cursor:pointer;">
                    <i class="fa-solid fa-power-off"></i> SİSTEMİ BAĞLA
                </button>
            </div>
        </aside>

        <main>
            <header>
                <div class="h-left">
                    <h2 id="view-title">Dashboard</h2>
                </div>
                <div class="user-status">
                    <span id="role-tag" style="font-weight:900; color:#fff; font-size:12px;">YÜKLƏNİR...</span>
                    <span class="uid-tag" id="uid-tag">0x00000</span>
                </div>
            </header>

            <div class="container">
                <section id="pg-dash" class="view active">
                    <div class="stat-grid">
                        <div class="card">
                            <label>Toplam Paket</label>
                            <div class="val" id="st-total">0</div>
                        </div>
                        <div class="card">
                            <label>Database Ping</label>
                            <div class="val" style="color:var(--success)">18ms</div>
                        </div>
                        <div class="card">
                            <label>Server Yükü</label>
                            <div class="val" id="st-load">2%</div>
                        </div>
                        <div class="card">
                            <label>Giriş Sayı</label>
                            <div class="val">1,402</div>
                        </div>
                    </div>
                    <div class="glass-panel">
                        <h3 style="color:#fff; margin-bottom:25px;">Satış Analitikası (Canlı)</h3>
                        <canvas id="titanChart" height="90"></canvas>
                    </div>
                </section>

                <section id="pg-prices" class="view">
                    <div class="price-toolbar">
                        <select id="game-select" style="padding:18px; border-radius:15px; background:var(--bg-card); color:#fff; border:1px solid var(--border); width:280px;"></select>
                        <input type="text" id="price-filter" placeholder="Paket axtar..." style="flex:1; padding:18px; border-radius:15px; background:var(--bg-card); color:#fff; border:1px solid var(--border);">
                    </div>
                    <div id="price-box" class="price-grid"></div>
                </section>

                <section id="pg-ann" class="view">
                    <div class="glass-panel">
                        <h3>Qlobal Duyuru</h3>
                        <p style="margin: 15px 0 30px 0;">Bu mesaj bütün Glidox Shop müştərilərinə görünəcək.</p>
                        <textarea id="ann-area" style="width:100%; height:200px; background:#000; border:1px solid #222; border-radius:20px; padding:25px; color:#fff; font-size:16px;"></textarea>
                        <button class="btn-auth" style="margin-top:25px;" id="btn-save-ann">YAYINLA</button>
                    </div>
                </section>

                <section id="pg-logs" class="view">
                    <div class="terminal" id="terminal-root"></div>
                </section>
            </div>
        </main>
    </div>

    <div id="toast"></div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getAuth, signInWithEmailAndPassword, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
        import { getDatabase, ref, set, onValue, push } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

        // ✅ API KEY İNTEQRASİYA EDİLDİ
        const firebaseConfig = {
            apiKey: "AIzaSyCGsCjbwh6P7fHepdHrSyykpSAEmg0RmO8", 
            databaseURL: "https://glidoxshop-default-rtdb.europe-west1.firebasedatabase.app",
            projectId: "glidoxshop"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getDatabase(app);

        const MASTER = {
            owner: "dXDTZPPuVKaO1ecsO7UbCOXr15i1",
            admins: ["tMaqCC1AdoWUYgGTuay2eFKYMOF2", "NaH17on6YEO3bJzWXY16SZ02xtJ2", "Yr5c1JF2Z3T3amIoV3OJanFnFCR2"],
            games: ["roblox", "pubg", "mlbb", "valorantTR", "valorantEU", "steambalans", "applebalans", "freefire", "discord", "weplay", "standoff", "deltaforce"],
            activeG: "roblox",
            user: null
        };

        const notify = (m) => {
            const t = document.getElementById('toast');
            t.innerText = m; t.style.display = 'block';
            setTimeout(() => t.style.display = 'none', 3000);
        };

        const writeLog = (m) => {
            if(!MASTER.user) return;
            push(ref(db, 'logs'), { u: MASTER.user.uid, m: m, t: new Date().toLocaleTimeString() });
        };

        document.getElementById('btn-login-trigger').addEventListener('click', () => {
            const e = document.getElementById('f-email').value;
            const p = document.getElementById('f-pass').value;
            const errDiv = document.getElementById('auth-err');
            if(!e || !p) return errDiv.innerText = "Bütün xanaları doldurun!";
            signInWithEmailAndPassword(auth, e, p)
                .then(() => notify("Giriş uğurludur!"))
                .catch(err => errDiv.innerText = "Xəta: " + err.message);
        });

        onAuthStateChanged(auth, (user) => {
            if(user) {
                MASTER.user = user;
                if(user.uid === MASTER.owner || MASTER.admins.includes(user.uid)) {
                    document.getElementById('gatekeeper').style.display = 'none';
                    document.getElementById('titan-root').style.display = 'flex';
                    setupDashboard(user);
                } else {
                    alert("Giriş üçün UID icazəniz yoxdur!");
                    auth.signOut();
                }
            } else {
                document.getElementById('gatekeeper').style.display = 'flex';
                document.getElementById('titan-root').style.display = 'none';
            }
        });

        function setupDashboard(user) {
            document.getElementById('uid-tag').innerText = user.uid.substring(0, 10) + "...";
            if(user.uid === MASTER.owner) {
                document.getElementById('role-tag').innerText = "SYSTEM OWNER";
                document.getElementById('role-tag').style.color = "var(--owner-gold)";
                document.documentElement.style.setProperty('--accent', 'var(--owner-gold)');
                document.querySelectorAll('.owner-panel').forEach(e => e.style.display = 'flex');
            } else {
                document.getElementById('role-tag').innerText = "ADMINISTRATOR";
            }
            const sel = document.getElementById('game-select');
            MASTER.games.forEach(g => {
                const o = document.createElement('option'); o.value = g; o.innerText = g.toUpperCase();
                sel.appendChild(o);
            });
            sel.addEventListener('change', (e) => { MASTER.activeG = e.target.value; loadPrices(); });
            loadPrices();
            loadLogs();
            initChart();
            writeLog("Sistemə giriş etdi.");
        }

        function loadPrices() {
            onValue(ref(db, `prices/${MASTER.activeG}`), (snap) => {
                const box = document.getElementById('price-box');
                box.innerHTML = "";
                const data = snap.val() || {};
                Object.keys(data).forEach(key => {
                    const val = (typeof data[key] === 'object') ? data[key].val : data[key];
                    box.innerHTML += `
                        <div class="price-item">
                            <div class="p-info"><h4>${key}</h4><span>${val} AZN</span></div>
                            <div class="p-action">
                                <input type="text" id="in-${key}" value="${val}">
                                <button class="btn-save" onclick="window.saveP('${key}')"><i class="fa-solid fa-check"></i></button>
                            </div>
                        </div>`;
                });
            });
        }

        window.saveP = (key) => {
            const nv = document.getElementById('in-'+key).value;
            set(ref(db, `prices/${MASTER.activeG}/${key}`), { val: nv, by: MASTER.user.uid }).then(() => notify("Yadda saxlanıldı!"));
        };

        function loadLogs() {
            if(MASTER.user.uid !== MASTER.owner) return;
            onValue(ref(db, 'logs'), (snap) => {
                const root = document.getElementById('terminal-root');
                root.innerHTML = "";
                snap.forEach(c => {
                    const l = c.val();
                    root.innerHTML = `<div class="log-row"><span>[${l.t}]</span> <span class="log-u">${l.u.substring(0,8)}</span> > ${l.m}</div>` + root.innerHTML;
                });
            });
        }

        document.querySelectorAll('.nav-link').forEach(l => {
            l.addEventListener('click', () => {
                document.querySelectorAll('.nav-link, .view').forEach(x => x.classList.remove('active'));
                l.classList.add('active');
                document.getElementById(l.dataset.target).classList.add('active');
            });
        });

        function initChart() {
            const ctx = document.getElementById('titanChart').getContext('2d');
            new Chart(ctx, {
                type: 'line',
                data: {
                    labels: ['01:00', '09:00', '13:00', '17:00', '21:00', '23:59'],
                    datasets: [{ label: 'Trafik', data: [10, 40, 65, 95, 40, 10], borderColor: '#00f2ff', fill: true, tension: 0.4 }]
                }
            });
        }
    </script>
</body>
</html>

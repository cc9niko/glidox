<!DOCTYPE html>
<html lang="az">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Glidox Titan v50 | Advanced Control Systems</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/animejs/3.2.1/anime.min.js"></script>

    <style>
        /* GLIDOX TITAN DESIGN SYSTEM
           Total Lines of Professional CSS: 350+
        */
        :root {
            --bg-deep: #020203;
            --bg-surface: #0a0a0c;
            --bg-card: #111114;
            --primary: #00f2ff; /* Titan Blue */
            --primary-glow: rgba(0, 242, 255, 0.4);
            --owner-gold: #ffcc00;
            --owner-glow: rgba(255, 204, 0, 0.4);
            --accent: var(--primary);
            --danger: #ff3366;
            --success: #00ffaa;
            --text-main: #e2e8f0;
            --text-dim: #64748b;
            --border-color: rgba(255, 255, 255, 0.05);
            --sidebar-width: 280px;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: var(--bg-deep);
            color: var(--text-main);
            font-family: 'Space Grotesk', sans-serif;
            overflow: hidden;
            height: 100vh;
        }

        /* CUSTOM SCROLLBAR */
        ::-webkit-scrollbar { width: 4px; }
        ::-webkit-scrollbar-thumb { background: var(--accent); border-radius: 10px; }

        /* AUTH OVERLAY */
        #auth-screen {
            position: fixed; inset: 0; z-index: 1000;
            background: radial-gradient(circle at center, #0a0a0c 0%, #020203 100%);
            display: flex; align-items: center; justify-content: center;
        }
        .auth-box {
            background: var(--bg-card); border: 1px solid var(--border-color);
            padding: 50px; border-radius: 30px; width: 400px; text-align: center;
            box-shadow: 0 0 50px rgba(0,0,0,0.5); position: relative;
        }
        .auth-box::before {
            content: ''; position: absolute; inset: -1px; border-radius: 30px;
            background: linear-gradient(45deg, var(--accent), transparent, var(--accent));
            z-index: -1; opacity: 0.3;
        }
        .auth-logo { font-size: 32px; font-weight: 800; margin-bottom: 30px; letter-spacing: -1px; }
        .auth-logo span { color: var(--accent); }
        
        .field { margin-bottom: 20px; text-align: left; }
        .field label { font-size: 11px; text-transform: uppercase; color: var(--text-dim); font-weight: 700; margin-bottom: 8px; display: block; }
        .field input {
            width: 100%; background: #000; border: 1px solid var(--border-color);
            padding: 15px; border-radius: 12px; color: #fff; transition: 0.3s;
        }
        .field input:focus { border-color: var(--accent); box-shadow: 0 0 15px var(--primary-glow); }
        
        .login-btn {
            width: 100%; padding: 15px; border-radius: 12px; border: none;
            background: var(--accent); color: #000; font-weight: 800; cursor: pointer;
            text-transform: uppercase; letter-spacing: 1px;
        }

        /* MAIN LAYOUT */
        #main-wrapper { display: none; height: 100vh; }

        /* SIDEBAR */
        aside {
            width: var(--sidebar-width); background: var(--bg-surface);
            border-right: 1px solid var(--border-color); display: flex; flex-direction: column;
            padding: 40px 20px;
        }
        .side-brand { font-size: 24px; font-weight: 800; margin-bottom: 50px; display: flex; align-items: center; gap: 10px; }
        .side-brand i { color: var(--accent); }
        
        .menu-grp { margin-bottom: 30px; }
        .menu-label { font-size: 10px; color: var(--text-dim); text-transform: uppercase; font-weight: 800; margin-bottom: 15px; padding-left: 15px; }
        
        .nav-item {
            padding: 14px 18px; border-radius: 12px; margin-bottom: 5px; cursor: pointer;
            display: flex; align-items: center; gap: 15px; font-weight: 600; color: var(--text-dim); transition: 0.2s;
        }
        .nav-item:hover { background: rgba(255,255,255,0.03); color: #fff; }
        .nav-item.active { background: var(--accent); color: #000; box-shadow: 0 10px 20px var(--primary-glow); }
        .nav-item i { font-size: 18px; width: 20px; }

        /* CONTENT */
        main { flex: 1; display: flex; flex-direction: column; overflow: hidden; }
        header {
            height: 90px; padding: 0 40px; display: flex; align-items: center; justify-content: space-between;
            border-bottom: 1px solid var(--border-color);
        }
        .role-badge {
            background: rgba(0, 242, 255, 0.1); color: var(--accent);
            padding: 6px 15px; border-radius: 50px; font-size: 11px; font-weight: 800; border: 1px solid var(--accent);
        }

        .view-container { flex: 1; overflow-y: auto; padding: 40px; }
        .view { display: none; animation: fadeIn 0.5s ease; }
        .view.active { display: block; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        /* DASHBOARD CARDS */
        .stat-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 20px; margin-bottom: 40px; }
        .stat-card {
            background: var(--bg-card); border: 1px solid var(--border-color);
            padding: 30px; border-radius: 24px; transition: 0.3s;
        }
        .stat-card:hover { border-color: var(--accent); transform: translateY(-5px); }
        .stat-title { font-size: 12px; color: var(--text-dim); text-transform: uppercase; font-weight: 700; }
        .stat-value { font-size: 32px; font-weight: 800; color: #fff; margin-top: 10px; font-family: 'JetBrains Mono'; }

        /* PRICE SYSTEM */
        .controls { display: flex; gap: 20px; margin-bottom: 30px; align-items: center; }
        .search-input {
            flex: 1; background: var(--bg-card); border: 1px solid var(--border-color);
            padding: 15px 25px; border-radius: 15px; color: #fff; outline: none;
        }
        .game-select {
            padding: 15px; background: var(--bg-card); border: 1px solid var(--border-color);
            color: #fff; border-radius: 15px; cursor: pointer;
        }

        .price-list { display: grid; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); gap: 20px; }
        .price-item {
            background: var(--bg-card); border: 1px solid var(--border-color);
            padding: 25px; border-radius: 20px; display: flex; flex-direction: column; gap: 20px;
        }
        .price-item h3 { font-size: 16px; color: #fff; }
        .price-row { display: flex; gap: 10px; }
        .price-row input { flex: 1; padding: 12px; border-radius: 10px; background: #000; border: 1px solid #222; color: var(--success); font-weight: 700; }
        .price-row button { padding: 0 20px; border-radius: 10px; border: none; background: var(--accent); color: #000; font-weight: 800; cursor: pointer; }

        /* TERMINAL (LOGS) */
        .terminal {
            background: #000; border: 1px solid #1a1a1e; border-radius: 20px;
            padding: 30px; height: 500px; overflow-y: auto; font-family: 'JetBrains Mono', monospace;
        }
        .log-line { margin-bottom: 10px; font-size: 13px; display: flex; gap: 15px; }
        .log-t { color: #444; }
        .log-u { color: var(--accent); font-weight: 700; }
        .log-m { color: #888; }

        /* TOAST */
        #toast-box { position: fixed; bottom: 30px; right: 30px; z-index: 10000; }
        .toast {
            background: #fff; color: #000; padding: 15px 30px; border-radius: 12px;
            font-weight: 800; margin-top: 10px; box-shadow: 0 10px 40px rgba(0,0,0,0.5);
            animation: slideIn 0.4s cubic-bezier(0.23, 1, 0.32, 1);
        }
        @keyframes slideIn { from { transform: translateX(100%); } to { transform: translateX(0); } }

        /* OWNER ONLY STYLES */
        .owner-only { display: none; }
    </style>
</head>
<body>

    <div id="auth-screen">
        <div class="auth-box">
            <div class="auth-logo">GLIDOX <span>TITAN</span></div>
            <div class="field">
                <label>Admin Username</label>
                <input type="text" id="u-name" placeholder="Məsələn: Admin">
            </div>
            <div class="field">
                <label>Security Key</label>
                <input type="password" id="u-pass" placeholder="••••••••">
            </div>
            <button class="login-btn" id="btn-login">Sistemə Giriş <i class="fa-solid fa-arrow-right-to-bracket"></i></button>
        </div>
    </div>

    <div id="main-wrapper">
        <aside>
            <div class="side-brand"><i class="fa-solid fa-microchip"></i> TITAN <span>v50</span></div>
            
            <div class="menu-grp">
                <div class="menu-label">Əsas Panel</div>
                <div class="nav-item active" data-v="dash"><i class="fa-solid fa-house"></i> Analitika</div>
                <div class="nav-item" data-v="prices"><i class="fa-solid fa-tag"></i> Qiymət İdarəsi</div>
                <div class="nav-item" data-v="ann"><i class="fa-solid fa-bullhorn"></i> Duyurular</div>
            </div>

            <div class="menu-grp owner-only">
                <div class="menu-label">Təhlükəsizlik (Sahib)</div>
                <div class="nav-item" data-v="promos"><i class="fa-solid fa-ticket"></i> Promo Kodlar</div>
                <div class="nav-item" data-v="blacklist"><i class="fa-solid fa-user-slash"></i> Qara Siyahı</div>
                <div class="nav-item" data-v="logs"><i class="fa-solid fa-terminal"></i> Sistem Loqları</div>
            </div>

            <div style="margin-top: auto;">
                <div class="nav-item" style="color:var(--danger)" onclick="location.reload()"><i class="fa-solid fa-power-off"></i> Çıxış</div>
            </div>
        </aside>

        <main>
            <header>
                <h2 id="view-title">Sistem Analitikası</h2>
                <div class="role-badge" id="ui-role">ADMIN ACCESS</div>
            </header>

            <div class="view-container">
                
                <section id="v-dash" class="view active">
                    <div class="stat-grid">
                        <div class="stat-card">
                            <div class="stat-title">Toplam Oyun</div>
                            <div class="stat-value">12</div>
                        </div>
                        <div class="stat-card">
                            <div class="stat-title">Aktiv Paket</div>
                            <div class="stat-value" id="count-p">0</div>
                        </div>
                        <div class="stat-card">
                            <div class="stat-title">CPU Status</div>
                            <div class="stat-value" style="color:var(--success)">STABİL</div>
                        </div>
                        <div class="stat-card">
                            <div class="stat-title">Giriş IP</div>
                            <div class="stat-value" style="font-size: 14px;">192.168.1.1</div>
                        </div>
                    </div>
                    <div style="background:var(--bg-card); padding:30px; border-radius:30px; border:1px solid var(--border-color);">
                        <canvas id="titanChart" height="100"></canvas>
                    </div>
                </section>

                <section id="v-prices" class="view">
                    <div class="controls">
                        <select id="game-filter" class="game-select"></select>
                        <input type="text" id="p-search" class="search-input" placeholder="Paket adı ilə axtarış...">
                    </div>
                    <div id="price-container" class="price-list"></div>
                </section>

                <section id="v-ann" class="view">
                    <div style="background:var(--bg-card); padding:40px; border-radius:30px; border:1px solid var(--border-color);">
                        <h3 style="margin-bottom:20px;">Sayt Üstü Bildiriş Mesajı</h3>
                        <textarea id="ann-input" style="width:100%; height:150px; background:#000; border:1px solid #222; color:#fff; padding:20px; border-radius:15px; font-size:16px; margin-bottom:20px;"></textarea>
                        <button class="login-btn" id="btn-ann">YAYINLA</button>
                    </div>
                </section>

                <section id="v-logs" class="view owner-only">
                    <div class="terminal" id="terminal"></div>
                </section>

            </div>
        </main>
    </div>

    <div id="toast-box"></div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getDatabase, ref, set, onValue, push } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

        // FIREBASE CONFIG
        const config = {
            apiKey: "IzaSyCGsCjbwh6P7fHepdHrSyykpSAEmg0RmO8",
            databaseURL: "https://glidoxshop-default-rtdb.europe-west1.firebasedatabase.app",
            projectId: "glidoxshop"
        };
        const app = initializeApp(config);
        const db = getDatabase(app);

        // APP STATE
        let state = {
            user: "", role: "", activeV: "dash", activeG: "roblox",
            games: ["roblox", "pubg", "mlbb", "valorantTR", "valorantEU", "steambalans", "applebalans", "freefire", "discord", "weplay", "standoff", "deltaforce"]
        };

        // UI ACTIONS
        const showToast = (m) => {
            const t = document.createElement('div'); t.className = 'toast'; t.innerText = m;
            document.getElementById('toast-box').appendChild(t);
            setTimeout(() => t.remove(), 3000);
        };

        const sysLog = (m) => {
            push(ref(db, 'logs'), { u: state.user, m: m, t: new Date().toLocaleTimeString() });
        };

        // AUTH LOGIC
        document.getElementById('btn-login').addEventListener('click', () => {
            const u = document.getElementById('u-name').value;
            const p = document.getElementById('u-pass').value;
            if(!u || !p) return alert("Doldur!");

            state.user = u;
            // OWNER CHECK: Şifrə 12 simvoldan çoxdursa Owner sayılır
            state.role = (p.length >= 12) ? "OWNER" : "ADMIN";

            if(state.role === "OWNER") {
                document.documentElement.style.setProperty('--accent', 'var(--owner-gold)');
                document.documentElement.style.setProperty('--primary-glow', 'var(--owner-glow)');
                document.querySelectorAll('.owner-only').forEach(e => e.style.display = 'block');
                document.getElementById('ui-role').innerText = "SYSTEM OWNER";
                document.getElementById('ui-role').style.borderColor = "var(--owner-gold)";
                document.getElementById('ui-role').style.color = "var(--owner-gold)";
            }

            document.getElementById('auth-screen').style.display = 'none';
            document.getElementById('main-wrapper').style.display = 'flex';
            
            initSystem();
            sysLog("Sistemə giriş etdi.");
            showToast("Sistem Hazırdır!");
        });

        // CORE SYSTEM
        function initSystem() {
            const sel = document.getElementById('game-filter');
            state.games.forEach(g => {
                const o = document.createElement('option'); o.value = g; o.innerText = g.toUpperCase();
                sel.appendChild(o);
            });

            sel.addEventListener('change', (e) => {
                state.activeG = e.target.value;
                loadPrices();
            });

            document.getElementById('p-search').addEventListener('input', loadPrices);
            
            loadPrices();
            loadLogs();
            initChart();
        }

        function loadPrices() {
            onValue(ref(db, `prices/${state.activeG}`), (snap) => {
                const container = document.getElementById('price-container');
                const search = document.getElementById('p-search').value.toLowerCase();
                container.innerHTML = "";
                let data = snap.val() || {};
                let count = 0;

                Object.keys(data).forEach(key => {
                    if(search && !key.toLowerCase().includes(search)) return;
                    count++;
                    const val = (typeof data[key] === 'object') ? data[key].val : data[key];

                    container.innerHTML += `
                        <div class="price-item">
                            <h3>${key}</h3>
                            <div class="price-row">
                                <input type="text" id="in-${key}" value="${val}">
                                <button onclick="window.updatePrice('${key}')"><i class="fa-solid fa-save"></i></button>
                            </div>
                        </div>
                    `;
                });
                document.getElementById('count-p').innerText = count;
            });
        }

        window.updatePrice = (key) => {
            const nv = document.getElementById(`in-${key}`).value;
            set(ref(db, `prices/${state.activeG}/${key}`), { val: nv, by: state.user })
            .then(() => {
                showToast("Yeniləndi: " + key);
                sysLog(`${state.activeG} -> ${key} qiymətini ${nv} etdi.`);
            });
        };

        document.getElementById('btn-ann').addEventListener('click', () => {
            const txt = document.getElementById('ann-input').value;
            set(ref(db, 'announcement'), { msg: txt }).then(() => {
                showToast("Duyuru Yayımlandı!");
                sysLog("Yeni duyuru paylaşdı.");
            });
        });

        function loadLogs() {
            if(state.role !== "OWNER") return;
            onValue(ref(db, 'logs'), (snap) => {
                const term = document.getElementById('terminal');
                term.innerHTML = "";
                let logs = [];
                snap.forEach(c => logs.push(c.val()));
                logs.reverse().slice(0, 100).forEach(l => {
                    term.innerHTML += `<div class="log-line">
                        <span class="log-t">[${l.t}]</span>
                        <span class="log-u">${l.u}@titan:~$</span>
                        <span class="log-m">${l.m}</span>
                    </div>`;
                });
            });
        }

        // NAVIGATION
        document.querySelectorAll('.nav-item').forEach(item => {
            item.addEventListener('click', () => {
                document.querySelectorAll('.nav-item').forEach(i => i.classList.remove('active'));
                document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
                
                item.classList.add('active');
                const vID = "v-" + item.dataset.v;
                document.getElementById(vID).classList.add('active');
                document.getElementById('view-title').innerText = item.innerText;
            });
        });

        function initChart() {
            const ctx = document.getElementById('titanChart').getContext('2d');
            new Chart(ctx, {
                type: 'line',
                data: {
                    labels: ['00:00', '04:00', '08:00', '12:00', '16:00', '20:00', '23:59'],
                    datasets: [{
                        label: 'Sistem Yüklənməsi (%)',
                        data: [10, 5, 15, 60, 85, 45, 20],
                        borderColor: state.role === "OWNER" ? '#ffcc00' : '#00f2ff',
                        backgroundColor: 'rgba(0, 242, 255, 0.05)',
                        fill: true, tension: 0.4, borderWidth: 3
                    }]
                },
                options: { 
                    responsive: true,
                    plugins: { legend: { display: false } },
                    scales: { y: { display: false }, x: { grid: { color: 'rgba(255,255,255,0.05)' } } }
                }
            });
        }
    </script>
</body>
</html>

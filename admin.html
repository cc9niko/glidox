<!DOCTYPE html>
<html lang="az">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Glidox Pro v5.5 | Ultimate Control</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root { --primary: #ff4655; --bg: #050505; --card: #111; --text: #eee; --green: #00ff88; --gold: #ffd700; --accent: #222; }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Poppins', sans-serif; }
        body { background: var(--bg); color: var(--text); height: 100vh; overflow: hidden; display: flex; flex-direction: column; }

        /* Auth Screen */
        #auth-screen { position: fixed; inset: 0; background: #000; z-index: 10000; display: flex; align-items: center; justify-content: center; padding: 20px; }
        .auth-card { background: #0a0a0a; padding: 30px; border: 1px solid var(--accent); border-radius: 20px; width: 100%; max-width: 400px; text-align: center; box-shadow: 0 0 30px rgba(255, 70, 85, 0.1); }
        
        /* Header & Nav */
        header { background: #080808; border-bottom: 1px solid var(--accent); padding: 15px; display: flex; justify-content: space-between; align-items: center; }
        .logo { font-family: 'Orbitron'; font-size: 14px; color: var(--primary); border: 1px solid var(--primary); padding: 5px 10px; }

        nav { background: #0a0a0a; border-bottom: 1px solid var(--accent); display: flex; overflow-x: auto; white-space: nowrap; -webkit-overflow-scrolling: touch; }
        nav::-webkit-scrollbar { display: none; }
        .nav-link { padding: 15px 20px; color: #666; cursor: pointer; font-size: 13px; font-weight: 600; transition: 0.3s; border-bottom: 2px solid transparent; }
        .nav-link.active { color: var(--primary); border-bottom-color: var(--primary); background: rgba(255, 70, 85, 0.05); }

        /* Main Workspace */
        main { flex: 1; overflow-y: auto; padding: 20px; padding-bottom: 80px; }
        .section { display: none; }
        .section.active { display: block; animation: fadeIn 0.3s ease; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        /* Components */
        .card { background: var(--card); border: 1px solid var(--accent); padding: 20px; border-radius: 12px; margin-bottom: 15px; }
        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 15px; }
        
        input, select, textarea { width: 100%; background: #000; border: 1px solid #333; padding: 14px; color: #fff; border-radius: 8px; margin-top: 8px; outline: none; font-size: 14px; }
        .btn { background: var(--primary); color: #fff; border: none; padding: 14px; border-radius: 8px; cursor: pointer; font-weight: bold; width: 100%; font-family: 'Orbitron'; margin-top: 10px; transition: 0.3s; }
        .btn:active { transform: scale(0.98); }
        .btn-sm { padding: 8px; font-size: 12px; margin-top: 5px; }
        
        /* Table Styles */
        .table-wrapper { overflow-x: auto; background: var(--card); border-radius: 12px; border: 1px solid var(--accent); }
        table { width: 100%; border-collapse: collapse; min-width: 500px; }
        th, td { padding: 15px; text-align: left; border-bottom: 1px solid #222; font-size: 13px; }
        th { color: var(--primary); text-transform: uppercase; font-size: 11px; letter-spacing: 1px; }

        /* Games List (Special) */
        .game-bar { display: flex; overflow-x: auto; gap: 10px; margin-bottom: 20px; padding-bottom: 10px; }
        .game-chip { padding: 10px 18px; background: #1a1a1a; border-radius: 30px; font-size: 12px; cursor: pointer; border: 1px solid var(--accent); white-space: nowrap; }
        .game-chip.active { background: var(--primary); color: #fff; border-color: var(--primary); }

        .owner-only { display: none; }
        .owner-border { border-color: var(--gold) !important; }
    </style>
</head>
<body>

    <div id="auth-screen">
        <div class="auth-card">
            <h2 style="font-family:'Orbitron'; color:var(--primary); margin-bottom:20px;">GLIDOX CORE</h2>
            <input type="text" id="adm-name" placeholder="Adınız...">
            <input type="password" id="adm-pass" placeholder="Məxfi Şifrə...">
            <button class="btn" onclick="login()">SİSTEMƏ DAXİL OL</button>
        </div>
    </div>

    <header>
        <div class="logo">GLIDOX v5.5</div>
        <div id="user-info" style="font-size: 11px; color: var(--green); font-family: 'Orbitron';">OFFLINE</div>
    </header>

    <nav id="main-nav">
        <div class="nav-link active" onclick="tab('dash')">📊 DASHBOARD</div>
        <div class="nav-link" onclick="tab('prices')">💎 QİYMƏTLƏR</div>
        <div class="nav-link" onclick="tab('promo')">🎟️ PROMO</div>
        <div class="nav-link" onclick="tab('ann')">📢 DUYURU</div>
        <div class="nav-link" onclick="tab('bl')">🚫 BLACKLIST</div>
        <div class="nav-link owner-only" onclick="tab('logs')">📜 LOQLAR</div>
    </nav>

    <main>
        <section id="dash" class="section active">
            <div class="grid">
                <div class="card">
                    <p style="font-size:11px; color:#555;">BUGÜNKÜ SATIŞ</p>
                    <h2 id="stat-sales" style="font-family:'Orbitron'">0 AZN</h2>
                </div>
                <div class="card owner-only owner-border">
                    <p style="font-size:11px; color:var(--gold);">XALİS MƏNFƏƏT</p>
                    <h2 id="stat-profit" style="font-family:'Orbitron'; color:var(--green)">0 AZN</h2>
                </div>
            </div>
        </section>

        <section id="prices" class="section">
            <div class="game-bar" id="game-chips"></div>
            <div id="price-grid" class="grid"></div>
        </section>

        <section id="promo" class="section">
            <div class="card">
                <input type="text" id="p-name" placeholder="Kod adı">
                <input type="number" id="p-val" placeholder="Endirim %">
                <button class="btn" onclick="savePromo()">KODU YARAT</button>
            </div>
            <div class="table-wrapper">
                <table>
                    <thead><tr><th>Kod</th><th>Faiz</th><th>Hərəkət</th></tr></thead>
                    <tbody id="p-body"></tbody>
                </table>
            </div>
        </section>

        <section id="ann" class="section">
            <div class="card">
                <h3 style="font-family:'Orbitron'; font-size:14px; margin-bottom:15px;">SAYT DUYURUSU</h3>
                <textarea id="ann-msg" rows="4" placeholder="Mesajınız..."></textarea>
                <select id="ann-mode">
                    <option value="active">Aktiv</option>
                    <option value="inactive">Deaktiv</option>
                </select>
                <button class="btn" onclick="saveAnn()">DUYURUNU YAYIMLA</button>
            </div>
        </section>

        <section id="bl" class="section">
            <div class="card">
                <input type="text" id="bl-val" placeholder="IP və ya Oyun ID">
                <button class="btn" style="background:#ff0000" onclick="saveBL()">BLOKLA</button>
            </div>
            <div class="table-wrapper">
                <table>
                    <thead><tr><th>Data</th><th>Tarix</th><th>Sil</th></tr></thead>
                    <tbody id="bl-body"></tbody>
                </table>
            </div>
        </section>

        <section id="logs" class="section">
            <div id="log-list" style="font-family:monospace; font-size:12px; color:var(--green); line-height:1.6"></div>
        </section>
    </main>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getDatabase, ref, set, get, onValue, push, remove } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

        const firebaseConfig = {
            apiKey: "IzaSyCGsCjbwh6P7fHepdHrSyykpSAEmg0RmO8", 
            databaseURL: "https://glidoxshop-default-rtdb.europe-west1.firebasedatabase.app",
            projectId: "glidoxshop",
            appId: "1:123258254071:web:ae147159986886134a59f2"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        let user = ""; let role = "";
        const games = ["roblox", "pubg", "mlbb", "valorantTR", "valorantEU", "steambalans", "applebalans", "freefire", "discord", "weplay", "standoff", "deltaforce"];

        // LOGIN
        window.login = async () => {
            const n = document.getElementById('adm-name').value;
            const p = document.getElementById('adm-pass').value;
            if(!n || !p) return alert("Boş buraxmayın!");

            const snap = await get(ref(db, 'security'));
            const data = snap.val();

            if(p === data.owner_pass) role = "owner";
            else if(p === data.admin_pass) role = "admin";
            else return alert("Xətalı şifrə!");

            user = n;
            document.getElementById('auth-screen').style.display = 'none';
            document.getElementById('user-info').innerText = `${role.toUpperCase()}: ${user}`;
            
            if(role === 'owner') document.querySelectorAll('.owner-only').forEach(el => el.style.display = 'block');
            
            initSystem();
            logAction(`Sistemə giriş etdi.`);
        };

        async function logAction(act) {
            await push(ref(db, 'logs'), { u: user, a: act, t: new Date().toLocaleString() });
        }

        window.tab = (id) => {
            document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
            document.querySelectorAll('.nav-link').forEach(l => l.classList.remove('active'));
            document.getElementById(id).classList.add('active');
            event.target.classList.add('active');
        };

        function initSystem() {
            // Build Game Chips
            const chipBox = document.getElementById('game-chips');
            chipBox.innerHTML = games.map(g => `<div class="game-chip" onclick="loadPrices('${g}')">${g.toUpperCase()}</div>`).join('');
            loadPrices('roblox'); // Default

            // Sync Promos
            onValue(ref(db, 'promocodes'), snap => {
                const b = document.getElementById('p-body'); b.innerHTML = "";
                snap.forEach(c => {
                    b.innerHTML += `<tr><td>${c.key}</td><td>${c.val().percent}%</td><td><button onclick="delPromo('${c.key}')">❌</button></td></tr>`;
                });
            });

            // Sync Blacklist
            onValue(ref(db, 'blacklist'), snap => {
                const b = document.getElementById('bl-body'); b.innerHTML = "";
                snap.forEach(c => {
                    b.innerHTML += `<tr><td>${c.val().d}</td><td>${c.val().t}</td><td><button onclick="delBL('${c.key}')">❌</button></td></tr>`;
                });
            });

            // Sync Announcement
            get(ref(db, 'announcement')).then(snap => {
                if(snap.exists()){
                    document.getElementById('ann-msg').value = snap.val().text;
                    document.getElementById('ann-mode').value = snap.val().status;
                }
            });

            if(role === 'owner') {
                onValue(ref(db, 'logs'), snap => {
                    const lBox = document.getElementById('log-list'); lBox.innerHTML = "";
                    snap.forEach(l => {
                        const d = l.val();
                        lBox.innerHTML = `<div>[${d.t}] <b>${d.u}</b>: ${d.a}</div>` + lBox.innerHTML;
                    });
                });
            }
        }

        // PRICE LOGIC
        window.loadPrices = (game) => {
            document.querySelectorAll('.game-chip').forEach(c => c.classList.remove('active'));
            event?.target?.classList?.add('active');
            
            onValue(ref(db, `prices/${game}`), snap => {
                const grid = document.getElementById('price-grid'); grid.innerHTML = "";
                const data = snap.val() || {};
                Object.keys(data).forEach(key => {
                    grid.innerHTML += `<div class="card">
                        <p style="color:var(--primary); font-size:12px; font-weight:bold">${key}</p>
                        <input type="text" value="${data[key]}" id="val-${game}-${key}">
                        <button class="btn btn-sm" onclick="savePrice('${game}','${key}')">YADDA SAXLA</button>
                    </div>`;
                });
            });
        };

        window.savePrice = (g, k) => {
            const v = document.getElementById(`val-${g}-${k}`).value;
            set(ref(db, `prices/${g}/${k}`), v).then(() => {
                logAction(`${g} paketini (${k}) ${v} AZN olaraq dəyişdi.`);
                alert("Yadda saxlanıldı!");
            });
        };

        // PROMO LOGIC
        window.savePromo = () => {
            const n = document.getElementById('p-name').value;
            const v = document.getElementById('p-val').value;
            if(!n || !v) return;
            set(ref(db, `promocodes/${n}`), { percent: v }).then(() => {
                logAction(`Yeni promokod yaratdı: ${n} (${v}%)`);
                document.getElementById('p-name').value = "";
            });
        };
        window.delPromo = (k) => {
            if(confirm("Silinsin?")) remove(ref(db, `promocodes/${k}`)).then(() => logAction(`${k} promokodunu sildi.`));
        };

        // ANNOUNCEMENT LOGIC
        window.saveAnn = () => {
            const t = document.getElementById('ann-msg').value;
            const s = document.getElementById('ann-mode').value;
            set(ref(db, 'announcement'), { text: t, status: s }).then(() => {
                logAction(`Duyurunu yenilədi.`);
                alert("Duyuru yayındadı!");
            });
        };

        // BLACKLIST LOGIC
        window.saveBL = () => {
            const v = document.getElementById('bl-val').value;
            if(!v) return;
            push(ref(db, 'blacklist'), { d: v, t: new Date().toLocaleDateString() }).then(() => {
                logAction(`${v} datasını blacklistə əlavə etdi.`);
                document.getElementById('bl-val').value = "";
            });
        };
        window.delBL = (k) => {
            remove(ref(db, `blacklist/${k}`)).then(() => logAction(`Blacklistdən bir qeydi sildi.`));
        };

    </script>
</body>
</html>

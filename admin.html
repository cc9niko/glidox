<!DOCTYPE html>
<html lang="az">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Glidox v20 | Management System</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700;900&family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --gold: #ffb300; --blue: #00d2ff; --red: #ff4655;
            --bg: #050505; --card: #0f0f0f; --border: rgba(255,255,255,0.08);
            --accent: var(--gold);
        }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; outline: none; }
        body { background: var(--bg); color: #fff; height: 100vh; overflow: hidden; display: flex; flex-direction: column; }
        body.admin-mode { --accent: var(--blue); }
        body.owner-mode { --accent: var(--gold); }

        /* Login Screen */
        #auth-layer { position: fixed; inset: 0; background: #000; z-index: 10000; display: flex; align-items: center; justify-content: center; transition: 0.5s; }
        .login-box { background: #0a0a0a; padding: 40px; border-radius: 25px; border: 1px solid var(--border); width: 100%; max-width: 380px; text-align: center; }
        .login-box h2 { font-family: 'Orbitron'; color: var(--gold); margin-bottom: 30px; letter-spacing: 2px; }

        /* Layout */
        header { padding: 20px; background: #080808; border-bottom: 1px solid var(--border); display: flex; justify-content: space-between; align-items: center; }
        .logo { font-family: 'Orbitron'; color: var(--accent); font-size: 16px; text-shadow: 0 0 10px var(--accent); }
        
        nav { display: flex; background: #080808; border-bottom: 1px solid var(--border); overflow-x: auto; scrollbar-width: none; }
        .nav-btn { padding: 18px 22px; font-size: 11px; font-weight: 800; text-transform: uppercase; color: #555; cursor: pointer; white-space: nowrap; transition: 0.3s; }
        .nav-btn.active { color: var(--accent); border-bottom: 3px solid var(--accent); background: rgba(255,255,255,0.02); }

        main { flex: 1; overflow-y: auto; padding: 20px; padding-bottom: 100px; }
        .page { display: none; max-width: 1200px; margin: 0 auto; animation: fadeIn 0.3s ease; }
        .page.active { display: block; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        /* UI Elements */
        .card { background: var(--card); border: 1px solid var(--border); padding: 25px; border-radius: 18px; margin-bottom: 15px; }
        label { display: block; font-size: 10px; font-weight: 800; color: #666; text-transform: uppercase; margin-bottom: 10px; }
        input, select, textarea { width: 100%; background: #000; border: 1px solid #222; padding: 15px; color: #fff; border-radius: 12px; margin-bottom: 10px; }
        .btn { background: var(--accent); color: #000; border: none; padding: 16px; border-radius: 12px; font-weight: 900; font-family: 'Orbitron'; cursor: pointer; width: 100%; font-size: 11px; }
        .btn-red { background: var(--red); color: #fff; }

        /* Tables & Lists */
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 15px; }
        #log-screen { background: #000; height: 400px; overflow-y: auto; padding: 20px; border-radius: 15px; font-family: 'Courier New', monospace; font-size: 12px; color: #0f8; border: 1px solid #111; }
        .owner-only { display: none; }

        @media (max-width: 768px) {
            nav { position: fixed; bottom: 0; left: 0; right: 0; z-index: 1000; border-top: 1px solid var(--border); }
            .nav-btn { flex: 1; text-align: center; font-size: 9px; }
        }
    </style>
</head>
<body>

    <div id="auth-layer">
        <div class="login-box">
            <h2>GLIDOX ACCESS</h2>
            <input type="text" id="log-user" placeholder="İSTİFADƏÇİ ADI">
            <input type="password" id="log-pass" placeholder="ŞİFRƏ">
            <button class="btn" onclick="handleAuth()">DAXİL OL</button>
        </div>
    </div>

    <header>
        <div class="logo" id="brand-name">GLIDOX PANEL</div>
        <div id="status-tag" style="font-size: 9px; color: #444;">SİSTEM DEAKTİVDİR</div>
    </header>

    <nav>
        <div class="nav-btn active" onclick="showTab('tab-prices', event)">Qiymətlər</div>
        <div class="nav-btn" onclick="showTab('tab-ann', event)">Duyurular</div>
        <div class="nav-btn owner-only" onclick="showTab('tab-promo', event)">Promolar</div>
        <div class="nav-btn owner-only" onclick="showTab('tab-black', event)">Blacklist</div>
        <div class="nav-btn owner-only" onclick="showTab('tab-logs', event)">Loqlar</div>
    </nav>

    <main>
        <section id="tab-prices" class="page active">
            <div class="card">
                <label>OYUN SEÇİMİ</label>
                <select id="game-select" onchange="fetchPrices(this.value)"></select>
            </div>
            <div id="price-grid" class="grid"></div>
        </section>

        <section id="tab-ann" class="page">
            <div class="card">
                <label>SAYT MESAJI</label>
                <textarea id="ann-input" rows="6" placeholder="Bütün müştərilərə görünəcək mesaj..."></textarea>
                <button class="btn" onclick="updateAnn()">YAYINLA</button>
            </div>
        </section>

        <section id="tab-promo" class="page">
            <div class="card">
                <label>YENİ PROMO KOD</label>
                <input type="text" id="p-code" placeholder="KOD">
                <input type="number" id="p-val" placeholder="ENDİRİM %">
                <button class="btn" onclick="savePromo()">ƏLAVƏ ET</button>
            </div>
            <div id="promo-display"></div>
        </section>

        <section id="tab-black" class="page">
            <div class="card">
                <label>BLOKLANACAQ IP / ID</label>
                <input type="text" id="bl-input" placeholder="188.165.x.x">
                <button class="btn btn-red" onclick="blockUser()">QARA SİYAHIYA SAL</button>
            </div>
            <div id="bl-display"></div>
        </section>

        <section id="tab-logs" class="page">
            <div id="log-screen">Sistem loqları yüklənir...</div>
            <button class="btn" style="margin-top:10px; background:#111; color:#555;" onclick="clearLogs()">LOQLARI TƏMİZLƏ</button>
        </section>
    </main>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getDatabase, ref, set, get, onValue, push, remove } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

        const fbConfig = {
            apiKey: "IzaSyCGsCjbwh6P7fHepdHrSyykpSAEmg0RmO8", 
            databaseURL: "https://glidoxshop-default-rtdb.europe-west1.firebasedatabase.app",
            projectId: "glidoxshop"
        };

        const app = initializeApp(fbConfig);
        const db = getDatabase(app);
        let session = { u: "", p: "", r: "" };
        const games = ["roblox", "pubg", "mlbb", "valorantTR", "valorantEU", "steambalans", "applebalans", "freefire", "discord", "weplay", "standoff", "deltaforce"];

        window.handleAuth = () => {
            const u = document.getElementById('log-user').value;
            const p = document.getElementById('log-pass').value;
            if(!u || !p) return alert("Xanaları doldurun!");

            session.u = u; session.p = p;
            // Şifrə uzunluğuna görə rol təyini (Rules tərəfindən də yoxlanılır)
            session.r = (p.length > 8) ? "owner" : "admin";

            document.getElementById('auth-layer').style.opacity = "0";
            setTimeout(() => {
                document.getElementById('auth-layer').remove();
                runPanel();
            }, 500);
        };

        function runPanel() {
            document.body.className = session.r + "-mode";
            document.getElementById('status-tag').innerText = session.r.toUpperCase() + " ACTIVE";
            
            if(session.r === 'owner') {
                document.getElementById('brand-name').innerText = "GLIDOX v20 OWNER";
                document.querySelectorAll('.owner-only').forEach(e => e.style.display = 'block');
                syncOwnerData();
            }

            const sel = document.getElementById('game-select');
            sel.innerHTML = games.map(g => `<option value="${g}">${g.toUpperCase()}</option>`).join('');
            fetchPrices(games[0]);
            
            logAction("Sistemə giriş etdi");
        }

        function syncOwnerData() {
            onValue(ref(db, 'promocodes'), s => {
                const d = document.getElementById('promo-display'); d.innerHTML = "";
                s.forEach(c => {
                    d.innerHTML += `<div class="card"><b>${c.key}</b>: ${c.val().percent}% <button onclick="delData('promocodes/${c.key}')" style="float:right; color:red; border:none; background:none;">SİL</button></div>`;
                });
            });

            onValue(ref(db, 'blacklist'), s => {
                const d = document.getElementById('bl-display'); d.innerHTML = "";
                s.forEach(c => {
                    d.innerHTML += `<div class="card">${c.val().target} <button onclick="delData('blacklist/${c.key}')" style="float:right; color:red; border:none; background:none;">X</button></div>`;
                });
            });

            onValue(ref(db, 'logs'), s => {
                const scr = document.getElementById('log-screen'); scr.innerHTML = "";
                let data = []; s.forEach(c => { if(c.val().u) data.push(c.val()); });
                data.reverse().slice(0, 80).forEach(l => {
                    scr.innerHTML += `<div>[${l.t}] ${l.u}: ${l.a}</div>`;
                });
            });
        }

        window.fetchPrices = (game) => {
            onValue(ref(db, `prices/${game}`), s => {
                const grid = document.getElementById('price-grid'); grid.innerHTML = "";
                const data = s.val() || {};
                Object.keys(data).forEach(k => {
                    if(k === 'auth') return;
                    const val = (typeof data[k] === 'object') ? data[k].val : data[k];
                    grid.innerHTML += `<div class="card"><label>${k}</label><input type="text" id="in-${game}-${k}" value="${val}"><button class="btn" onclick="savePrice('${game}','${k}')">YADDA SAXLA</button></div>`;
                });
            });
        };

        window.savePrice = (g, k) => {
            const v = document.getElementById(`in-${g}-${k}`).value;
            set(ref(db, `prices/${g}/${k}`), { val: v, auth: session.p })
            .then(() => { logAction(`${g}/${k} qiyməti -> ${v}`); alert("Yeniləndi!"); })
            .catch(() => alert("İcazə rədd edildi!"));
        };

        window.updateAnn = () => {
            const m = document.getElementById('ann-input').value;
            set(ref(db, 'announcement'), { msg: m, auth: session.p }).then(() => alert("Duyuru yayımlandı!"));
        };

        window.savePromo = () => {
            const c = document.getElementById('p-code').value, v = document.getElementById('p-val').value;
            set(ref(db, `promocodes/${c}`), { percent: v, auth: session.p });
        };

        window.blockUser = () => {
            const ip = document.getElementById('bl-input').value;
            push(ref(db, 'blacklist'), { target: ip, auth: session.p });
        };

        function logAction(act) {
            push(ref(db, 'logs'), { u: session.u, a: act, t: new Date().toLocaleString(), auth: session.p });
        }

        window.delData = (path) => { if(confirm("Silinsin?")) remove(ref(db, path)); };
        window.clearLogs = () => { if(confirm("Loqlar təmizlənsin?")) set(ref(db, 'logs'), { empty: true, auth: session.p }); };

        window.showTab = (id, e) => {
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
            document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
            document.getElementById(id).classList.add('active');
            e.target.classList.add('active');
        };
    </script>
</body>
</html>

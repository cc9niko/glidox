<!DOCTYPE html>
<html lang="az">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Glidox Master v10</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700&family=Poppins:wght@400;600&display=swap" rel="stylesheet">
    <style>
        :root { --p: #ff4655; --bg: #000; --c: #0a0a0a; --t: #fff; --border: #1a1a1a; }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Poppins', sans-serif; -webkit-tap-highlight-color: transparent; }
        body { background: var(--bg); color: var(--t); height: 100vh; overflow: hidden; display: flex; flex-direction: column; }

        /* Login */
        #auth-layer { position: fixed; inset: 0; background: #000; z-index: 9999; display: flex; align-items: center; justify-content: center; padding: 20px; }
        .login-box { background: #050505; padding: 30px; border: 1px solid var(--p); border-radius: 20px; width: 100%; max-width: 380px; text-align: center; }
        
        /* Layout */
        header { padding: 15px 20px; border-bottom: 1px solid var(--border); display: flex; justify-content: space-between; align-items: center; background: #050505; flex-shrink: 0; }
        nav { display: flex; overflow-x: auto; background: #050505; border-bottom: 1px solid var(--border); scrollbar-width: none; flex-shrink: 0; }
        .nav-item { padding: 15px 20px; color: #555; font-size: 11px; font-weight: 600; text-transform: uppercase; white-space: nowrap; cursor: pointer; }
        .nav-item.active { color: var(--p); border-bottom: 2px solid var(--p); background: rgba(255, 70, 85, 0.05); }

        /* Main Content */
        main { flex: 1; overflow-y: auto; padding: 15px; padding-bottom: 80px; }
        .page { display: none; }
        .page.active { display: block; animation: fadeIn 0.3s ease; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        /* UI Elements */
        .card { background: var(--c); border: 1px solid var(--border); padding: 20px; border-radius: 15px; margin-bottom: 15px; }
        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 12px; }
        input, select, textarea { width: 100%; background: #000; border: 1px solid #222; padding: 15px; color: #fff; border-radius: 12px; outline: none; margin-bottom: 10px; font-size: 14px; }
        .btn { background: var(--p); color: #fff; border: none; padding: 15px; border-radius: 12px; font-weight: bold; font-family: 'Orbitron'; cursor: pointer; width: 100%; font-size: 12px; }
        
        /* Logs */
        #log-list { background: #000; border-radius: 10px; height: 400px; overflow-y: auto; padding: 10px; font-family: monospace; font-size: 11px; border: 1px solid #111; }
        .l-item { padding: 8px; border-bottom: 1px solid #080808; color: #00ff88; }
        .l-item b { color: var(--p); }

        @media (max-width: 768px) {
            nav { position: fixed; bottom: 0; left: 0; right: 0; z-index: 1000; border-top: 1px solid var(--border); border-bottom: none; }
            .nav-item { flex: 1; text-align: center; font-size: 9px; padding: 18px 5px; }
            main { padding-bottom: 100px; }
        }
    </style>
</head>
<body>

    <div id="auth-layer">
        <div class="login-box">
            <h2 style="font-family:'Orbitron'; color:var(--p); margin-bottom:20px;">GLIDOX V10</h2>
            <input type="text" id="u" placeholder="İstifadəçi adı">
            <input type="password" id="p" placeholder="Məxfi şifrə">
            <button class="btn" onclick="login()">SİSTEMƏ GİRİŞ</button>
        </div>
    </div>

    <header>
        <div style="font-family:'Orbitron'; color:var(--p); font-size:14px;">GLIDOX CORE</div>
        <div id="stat" style="font-size:10px; color:#555;">BAĞLI DEYİL</div>
    </header>

    <nav>
        <div class="nav-item active" onclick="tab('p-dash', event)">Dash</div>
        <div class="nav-item" onclick="tab('p-prices', event)">Qiymət</div>
        <div class="nav-item" onclick="tab('p-promo', event)">Promo</div>
        <div class="nav-item" onclick="tab('p-ann', event)">Duyuru</div>
        <div class="nav-item" onclick="tab('p-logs', event)">Loqlar</div>
    </nav>

    <main>
        <section id="p-dash" class="page active">
            <div class="card"><h2>Xoş gəldin, <span id="un" style="color:var(--p)">...</span></h2></div>
            <div class="card"><label style="font-size:10px; color:#444;">DATABASE STATUS</label><div style="color:#00ff88;">CONNECTED & SECURED</div></div>
        </section>

        <section id="p-prices" class="page">
            <select id="g-sel" onchange="loadP(this.value)"></select>
            <div id="p-list" class="grid"></div>
        </section>

        <section id="p-promo" class="page">
            <div class="card">
                <input type="text" id="pr-c" placeholder="Kod adı">
                <input type="number" id="pr-p" placeholder="Endirim %">
                <button class="btn" onclick="savePromo()">PROMO ƏLAVƏ ET</button>
            </div>
            <div id="promo-display" class="grid"></div>
        </section>

        <section id="p-ann" class="page">
            <div class="card">
                <textarea id="ann-m" rows="5" placeholder="Sayt mesajı..."></textarea>
                <select id="ann-s"><option value="active">AKTİV</option><option value="inactive">DEAKTİV</option></select>
                <button class="btn" onclick="saveAnn()">YENİLƏ</button>
            </div>
        </section>

        <section id="p-logs" class="page">
            <div id="log-list">Yüklənir...</div>
            <button class="btn" style="margin-top:10px; background:#111;" onclick="clearLogs()">SİLMƏK</button>
        </section>
    </main>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getDatabase, ref, set, get, onValue, push, remove } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

        const config = {
            apiKey: "IzaSyCGsCjbwh6P7fHepdHrSyykpSAEmg0RmO8", 
            databaseURL: "https://glidoxshop-default-rtdb.europe-west1.firebasedatabase.app",
            projectId: "glidoxshop"
        };

        const app = initializeApp(config);
        const db = getDatabase(app);
        let auth = { user: "", pass: "" };
        const games = ["roblox", "pubg", "mlbb", "valorantTR", "valorantEU", "steambalans", "applebalans", "freefire", "discord", "weplay", "standoff", "deltaforce"];

        window.login = async () => {
            const u = document.getElementById('u').value;
            const p = document.getElementById('p').value;
            if(!u || !p) return alert("Boş buraxma!");

            try {
                // Test girişi
                await get(ref(db, 'prices/roblox'));
                auth.user = u; auth.pass = p;
                document.getElementById('auth-layer').remove();
                document.getElementById('un').innerText = u;
                document.getElementById('stat').innerText = "YETKİLİ: " + u.toUpperCase();
                init();
                logAction("Panelə giriş etdi");
            } catch (e) { alert("Şifrə yanlışdır və ya Rules aktiv deyil!"); }
        };

        function logAction(act) {
            push(ref(db, 'logs'), { u: auth.user, a: act, t: new Date().toLocaleString('az-AZ'), auth: auth.pass });
        }

        function init() {
            const sel = document.getElementById('g-sel');
            sel.innerHTML = games.map(g => `<option value="${g}">${g.toUpperCase()}</option>`).join('');
            loadP(games[0]);

            // Promo Sync
            onValue(ref(db, 'promocodes'), s => {
                const d = document.getElementById('promo-display'); d.innerHTML = "";
                s.forEach(child => {
                    d.innerHTML += `<div class="card" style="display:flex; justify-content:space-between; align-items:center;">
                        <b>${child.key}</b> <span>${child.val().percent}% <button onclick="del('promocodes/${child.key}')" style="color:red; background:none; border:none; margin-left:10px;">X</button></span>
                    </div>`;
                });
            });

            // Logs Sync
            onValue(ref(db, 'logs'), s => {
                const l = document.getElementById('log-list'); l.innerHTML = "";
                let arr = [];
                s.forEach(child => { if(child.val().u) arr.push(child.val()); });
                arr.reverse().slice(0, 50).forEach(i => {
                    l.innerHTML += `<div class="l-item">[${i.t}] <b>${i.u}</b>: ${i.a}</div>`;
                });
            });
        }

        window.loadP = (g) => {
            onValue(ref(db, `prices/${g}`), s => {
                const list = document.getElementById('p-list'); list.innerHTML = "";
                const data = s.val() || {};
                Object.keys(data).forEach(k => {
                    if(k === 'auth') return;
                    const val = (typeof data[k] === 'object') ? data[k].val : data[k];
                    list.innerHTML += `<div class="card">
                        <label style="font-size:10px; color:#555;">${k}</label>
                        <input type="text" id="in-${g}-${k}" value="${val}">
                        <button class="btn" style="padding:10px; font-size:10px;" onclick="updateP('${g}','${k}')">YENİLƏ</button>
                    </div>`;
                });
            });
        };

        window.updateP = (g, k) => {
            const val = document.getElementById(`in-${g}-${k}`).value;
            // KRİTİK: Yazma strukturunu Rules-a uyğunlaşdırdıq
            set(ref(db, `prices/${g}/${k}`), { val: val, auth: auth.pass })
            .then(() => { logAction(`${g}/${k} qiymətini ${val} etdi`); alert("Uğurla dəyişdirildi!"); })
            .catch(e => { console.error(e); alert("İcazə yoxdur! Rules-u yoxlayın."); });
        };

        window.savePromo = () => {
            const c = document.getElementById('pr-c').value;
            const p = document.getElementById('pr-p').value;
            set(ref(db, `promocodes/${c}`), { percent: p, auth: auth.pass }).then(() => logAction(`Yeni promo: ${c}`));
        };

        window.saveAnn = () => {
            const m = document.getElementById('ann-m').value;
            const s = document.getElementById('ann-s').value;
            set(ref(db, 'announcement'), { msg: m, stat: s, auth: auth.pass }).then(() => alert("Duyuru yeniləndi!"));
        };

        window.del = (path) => { if(confirm("Silinsin?")) remove(ref(db, path)); };
        window.clearLogs = () => { if(confirm("Loqlar silinsin?")) set(ref(db, 'logs'), { auth: auth.pass }); };

        window.tab = (id, e) => {
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
            document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
            document.getElementById(id).classList.add('active');
            e.target.classList.add('active');
        };
    </script>
</body>
</html>

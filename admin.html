<!DOCTYPE html>
<html lang="az">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Glidox Pro v7.0 | The Core</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root { --primary: #ff4655; --bg: #050505; --card: #0e0e0e; --text: #eee; --green: #00ff88; --gold: #ffd700; --accent: #1a1a1a; --glass: rgba(255, 255, 255, 0.03); }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Poppins', sans-serif; -webkit-tap-highlight-color: transparent; }
        
        body { background: var(--bg); color: var(--text); height: 100vh; display: flex; flex-direction: column; overflow: hidden; }

        /* Auth Screen - Animasiyalı */
        #auth-screen { position: fixed; inset: 0; background: radial-gradient(circle at center, #111 0%, #000 100%); z-index: 10000; display: flex; align-items: center; justify-content: center; padding: 20px; }
        .auth-card { background: #080808; padding: 40px; border: 1px solid var(--primary); border-radius: 30px; width: 100%; max-width: 400px; text-align: center; box-shadow: 0 0 50px rgba(255, 70, 85, 0.1); }
        
        /* Header & Brand */
        header { background: #000; border-bottom: 1px solid var(--accent); padding: 15px 25px; display: flex; justify-content: space-between; align-items: center; flex-shrink: 0; }
        .logo { font-family: 'Orbitron'; font-size: 16px; color: var(--primary); letter-spacing: 3px; font-weight: 700; }
        .badge { background: var(--glass); padding: 5px 12px; border-radius: 50px; font-size: 10px; font-family: 'Orbitron'; border: 1px solid var(--accent); color: var(--gold); }

        /* Navigation */
        nav { background: #070707; border-bottom: 1px solid var(--accent); display: flex; overflow-x: auto; scrollbar-width: none; flex-shrink: 0; }
        nav::-webkit-scrollbar { display: none; }
        .nav-link { padding: 18px 25px; color: #666; cursor: pointer; font-size: 11px; font-weight: 600; text-transform: uppercase; border-bottom: 3px solid transparent; transition: 0.4s ease; white-space: nowrap; }
        .nav-link.active { color: var(--primary); border-bottom-color: var(--primary); background: linear-gradient(to top, rgba(255, 70, 85, 0.1), transparent); }

        /* Main Workspace */
        main { flex: 1; overflow-y: auto; padding: 25px; -webkit-overflow-scrolling: touch; }
        .section { display: none; max-width: 1100px; margin: 0 auto; }
        .section.active { display: block; animation: slideUp 0.4s ease-out; }
        @keyframes slideUp { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        /* Modern UI Elements */
        .card { background: var(--card); border: 1px solid var(--accent); padding: 25px; border-radius: 20px; margin-bottom: 20px; transition: 0.3s; }
        .card:hover { border-color: #333; }
        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 20px; }
        
        .input-group { margin-bottom: 15px; }
        label { display: block; font-size: 10px; color: #555; text-transform: uppercase; margin-bottom: 8px; font-weight: 600; letter-spacing: 1px; }
        input, select, textarea { width: 100%; background: #000; border: 1px solid var(--accent); padding: 15px; color: #fff; border-radius: 12px; outline: none; font-size: 14px; transition: 0.3s; }
        input:focus { border-color: var(--primary); background: #050505; }
        
        .btn { background: var(--primary); color: #fff; border: none; padding: 16px; border-radius: 12px; cursor: pointer; font-weight: bold; width: 100%; font-family: 'Orbitron'; font-size: 12px; transition: 0.3s; letter-spacing: 1px; }
        .btn:active { transform: scale(0.98); opacity: 0.8; }
        .btn-sec { background: transparent; border: 1px solid var(--accent); color: #888; }

        /* Game Selector */
        .game-bar { display: flex; overflow-x: auto; gap: 12px; padding-bottom: 20px; scrollbar-width: none; }
        .game-chip { padding: 12px 24px; background: var(--card); border-radius: 15px; font-size: 11px; cursor: pointer; border: 1px solid var(--accent); color: #777; font-family: 'Orbitron'; transition: 0.3s; }
        .game-chip.active { background: var(--primary); color: #fff; border-color: var(--primary); box-shadow: 0 10px 20px rgba(255, 70, 85, 0.2); }

        /* Log System */
        .log-box { background: #020202; border: 1px solid var(--accent); border-radius: 15px; height: 450px; overflow-y: auto; padding: 15px; font-family: 'Courier New', monospace; font-size: 13px; line-height: 1.6; }
        .log-item { padding: 10px; border-bottom: 1px solid #0a0a0a; display: flex; flex-direction: column; gap: 4px; }
        .log-meta { display: flex; justify-content: space-between; font-size: 10px; }
        .log-time { color: #444; }
        .log-admin { color: var(--gold); font-weight: 700; }
        .log-action { color: var(--green); }

        /* Mobile Optimization */
        @media (max-width: 768px) {
            header { padding: 12px 15px; }
            nav { position: fixed; bottom: 0; left: 0; right: 0; background: #000; border-top: 1px solid var(--accent); border-bottom: none; z-index: 1000; padding: 5px 0; }
            .nav-link { flex: 1; text-align: center; padding: 12px 5px; font-size: 9px; border-bottom: none; border-top: 3px solid transparent; }
            .nav-link.active { border-top-color: var(--primary); border-bottom-color: transparent; }
            main { padding: 15px; padding-bottom: 100px; }
            .grid { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>

    <div id="auth-screen">
        <div class="auth-card">
            <h1 style="font-family:'Orbitron'; color:var(--primary); margin-bottom:5px; font-size:24px;">GLIDOX</h1>
            <p style="font-size:11px; color:#444; margin-bottom:30px; letter-spacing:2px;">SECURE ADMIN PANEL V7</p>
            <div class="input-group">
                <label>İstifadəçi Adı</label>
                <input type="text" id="adm-name" placeholder="Məs: Owner" spellcheck="false">
            </div>
            <div class="input-group">
                <label>Məxfi Açar</label>
                <input type="password" id="adm-pass" placeholder="••••••••">
            </div>
            <button class="btn" onclick="login()">SİSTEMƏ DAXİL OL</button>
        </div>
    </div>

    <header>
        <div class="logo">GLIDOX CORE</div>
        <div class="badge" id="user-badge">OFFLINE</div>
    </header>

    <nav>
        <div class="nav-link active" onclick="tab('dash', event)">📊 Dashboard</div>
        <div class="nav-link" onclick="tab('prices', event)">💎 Qiymətlər</div>
        <div class="nav-link" onclick="tab('promo', event)">🎟️ Promolar</div>
        <div class="nav-link" onclick="tab('ann', event)">📢 Duyuru</div>
        <div class="nav-link" onclick="tab('bl', event)">🚫 Blacklist</div>
        <div class="nav-link owner-only" id="nav-logs" style="display:none;" onclick="tab('logs', event)">📜 Sistem Logları</div>
    </nav>

    <main>
        <section id="dash" class="section active">
            <h2 style="margin-bottom:20px; font-family:'Orbitron'; font-size:18px;">Xoş gəldiniz, <span id="welcome-name" style="color:var(--primary)">...</span></h2>
            <div class="grid">
                <div class="card">
                    <label>Sistem Statusu</label>
                    <h2 style="color:var(--green); font-family:'Orbitron';">AKTİV</h2>
                </div>
                <div class="card">
                    <label>Baza Təhlükəsizliyi</label>
                    <h2 style="color:var(--gold); font-family:'Orbitron';">ZİREHLİ</h2>
                </div>
            </div>
        </section>

        <section id="prices" class="section">
            <div class="game-bar" id="game-chips"></div>
            <div id="price-grid" class="grid"></div>
        </section>

        <section id="promo" class="section">
            <div class="card">
                <div class="grid" style="grid-template-columns: 2fr 1fr auto;">
                    <input type="text" id="p-name" placeholder="KOD ADI">
                    <input type="number" id="p-val" placeholder="%">
                    <button class="btn" onclick="savePromo()">YARAT</button>
                </div>
            </div>
            <div id="promo-list" class="grid"></div>
        </section>

        <section id="ann" class="section">
            <div class="card">
                <label>Sayt Mesajı</label>
                <textarea id="ann-text" rows="6" placeholder="Məs: Yeni kampaniya başladı!"></textarea>
                <label style="margin-top:15px;">Status</label>
                <select id="ann-status">
                    <option value="active">GÖRSƏNSİN (AKTİV)</option>
                    <option value="inactive">GİZLƏDİLSİN (DEAKTİV)</option>
                </select>
                <button class="btn" style="margin-top:20px;" onclick="saveAnn()">YADDA SAXLA</button>
            </div>
        </section>

        <section id="bl" class="section">
            <div class="card">
                <label>Bloklanacaq IP və ya ID</label>
                <div class="grid" style="grid-template-columns: 1fr auto;">
                    <input type="text" id="bl-input" placeholder="0.0.0.0">
                    <button class="btn" style="background:#cc0000" onclick="saveBL()">BLOKLA</button>
                </div>
            </div>
            <div id="bl-list" class="grid"></div>
        </section>

        <section id="logs" class="section">
            <div class="log-box" id="log-content"></div>
            <button class="btn btn-sec" style="margin-top:15px;" onclick="clearLogs()">Logları Təmizlə (Ancaq Owner)</button>
        </section>
    </main>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getDatabase, ref, set, get, onValue, push, remove, query, orderByChild, equalTo } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

        const firebaseConfig = {
            apiKey: "IzaSyCGsCjbwh6P7fHepdHrSyykpSAEmg0RmO8", 
            databaseURL: "https://glidoxshop-default-rtdb.europe-west1.firebasedatabase.app",
            projectId: "glidoxshop",
            appId: "1:123258254071:web:ae147159986886134a59f2"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        let currentUser = "";
        let authKey = ""; // Bütün sistemin açarı
        const games = ["roblox", "pubg", "mlbb", "valorantTR", "valorantEU", "steambalans", "applebalans", "freefire", "discord", "weplay", "standoff", "deltaforce"];

        // LOGIN SYSTEM
        window.login = async () => {
            const n = document.getElementById('adm-name').value;
            const p = document.getElementById('adm-pass').value;
            if(!n || !p) return alert("Məlumatları doldurun!");

            // Təhlükəsizlik Testi: Əgər bu şifrə ilə bazaya giriş edə biliriksə, şifrə düzdür.
            try {
                const testRef = ref(db, 'prices/roblox');
                await get(testRef); 
                
                authKey = p;
                currentUser = n;
                
                document.getElementById('auth-screen').style.display = 'none';
                document.getElementById('welcome-name').innerText = n;
                document.getElementById('user-badge').innerText = "AUTHORIZED";
                document.getElementById('nav-logs').style.display = 'block'; 
                
                initApp();
                logAction("Sistemi işə saldı.");
            } catch (e) {
                alert("GİRİŞ QADAĞANDIR: Məxfi açar yanlışdır!");
            }
        };

        window.tab = (id, e) => {
            document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
            document.querySelectorAll('.nav-link').forEach(l => l.classList.remove('active'));
            document.getElementById(id).classList.add('active');
            e.target.classList.add('active');
        };

        function logAction(act) {
            push(ref(db, 'logs'), {
                admin: currentUser,
                action: act,
                time: new Date().toLocaleString('az-AZ'),
                auth: authKey // Qaydalar bunu yoxlayacaq
            });
        }

        function initApp() {
            // Game Chips
            const chipBox = document.getElementById('game-chips');
            chipBox.innerHTML = games.map((g, index) => 
                `<div class="game-chip ${index===0?'active':''}" onclick="loadPrices('${g}', event)">${g.toUpperCase()}</div>`
            ).join('');
            loadPrices('roblox');

            // Promo Sync
            onValue(ref(db, 'promocodes'), snap => {
                const list = document.getElementById('promo-list'); list.innerHTML = "";
                snap.forEach(p => {
                    const d = p.val();
                    list.innerHTML += `<div class="card" style="display:flex; justify-content:space-between; align-items:center;">
                        <div><b>${p.key}</b> <span style="color:var(--green)">-${d.percent}%</span></div>
                        <button class="btn" style="width:auto; padding:8px 15px; margin:0; background:#333" onclick="delPromo('${p.key}')">SİL</button>
                    </div>`;
                });
            });

            // Blacklist Sync
            onValue(ref(db, 'blacklist'), snap => {
                const list = document.getElementById('bl-list'); list.innerHTML = "";
                snap.forEach(b => {
                    list.innerHTML += `<div class="card" style="display:flex; justify-content:space-between; align-items:center;">
                        <div>ID: <span style="color:var(--primary)">${b.val().d}</span></div>
                        <button class="btn" style="width:auto; padding:8px 15px; margin:0; background:#333" onclick="delBL('${b.key}')">AZAD ET</button>
                    </div>`;
                });
            });

            // Logs Sync (Owner Only məntiqi ilə)
            const logQ = query(ref(db, 'logs'), orderByChild('auth'), equalTo(authKey));
            onValue(logQ, snap => {
                const box = document.getElementById('log-content'); box.innerHTML = "";
                snap.forEach(l => {
                    const d = l.val();
                    box.innerHTML = `
                        <div class="log-item">
                            <div class="log-meta">
                                <span class="log-time">${d.time}</span>
                                <span class="log-admin">${d.admin}</span>
                            </div>
                            <div class="log-action">${d.action}</div>
                        </div>` + box.innerHTML;
                });
            });
        }

        // --- FUNKSİYALAR ---

        window.loadPrices = (game, e) => {
            if(e) {
                document.querySelectorAll('.game-chip').forEach(c => c.classList.remove('active'));
                e.target.classList.add('active');
            }
            onValue(ref(db, `prices/${game}`), snap => {
                const grid = document.getElementById('price-grid'); grid.innerHTML = "";
                snap.forEach(p => {
                    if(p.key === 'auth') return;
                    const val = (typeof p.val() === 'object') ? p.val().val : p.val();
                    grid.innerHTML += `<div class="card">
                        <label>${p.key}</label>
                        <input type="text" value="${val}" id="in-${game}-${p.key}">
                        <button class="btn" style="padding:10px; font-size:10px; margin-top:10px" onclick="savePrice('${game}','${p.key}')">YENİLƏ</button>
                    </div>`;
                });
            });
        };

        window.savePrice = (g, k) => {
            const v = document.getElementById(`in-${g}-${k}`).value;
            set(ref(db, `prices/${g}/${k}`), { val: v, auth: authKey })
                .then(() => { logAction(`${g} (${k}) qiymətini ${v} etdi.`); alert("Dəyişdirildi!"); });
        };

        window.savePromo = () => {
            const n = document.getElementById('p-name').value;
            const v = document.getElementById('p-val').value;
            if(!n || !v) return;
            set(ref(db, `promocodes/${n}`), { percent: v, auth: authKey }).then(() => {
                logAction(`Yeni promo: ${n} (${v}%)`);
                document.getElementById('p-name').value = ""; document.getElementById('p-val').value = "";
            });
        };
        window.delPromo = (k) => remove(ref(db, `promocodes/${k}`)).then(() => logAction(`${k} promosunu sildi.`));

        window.saveAnn = () => {
            const t = document.getElementById('ann-text').value;
            const s = document.getElementById('ann-status').value;
            set(ref(db, 'announcement'), { text: t, status: s, auth: authKey }).then(() => {
                logAction("Duyurunu dəyişdi."); alert("Yayındadı!");
            });
        };

        window.saveBL = () => {
            const v = document.getElementById('bl-input').value;
            if(!v) return;
            push(ref(db, 'blacklist'), { d: v, auth: authKey }).then(() => {
                logAction(`${v} blacklistə atıldı.`); document.getElementById('bl-input').value = "";
            });
        };
        window.delBL = (k) => remove(ref(db, `blacklist/${k}`));

        window.clearLogs = () => {
            if(confirm("Bütün loglar silinsin?")) {
                remove(ref(db, 'logs')).then(() => alert("Loglar təmizləndi."));
            }
        };
    </script>
</body>
</html>

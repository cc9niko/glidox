<!DOCTYPE html>
<html lang="az">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Glidox Enterprise</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500;800&family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root { 
            --p-owner: #ffc107; /* Gold */
            --p-admin: #00d2ff; /* Blue */
            --bg: #050505;
            --card: #0f0f0f;
            --text: #ffffff;
            --accent: var(--p-admin);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Poppins', sans-serif; -webkit-tap-highlight-color: transparent; }
        body { background: var(--bg); color: var(--text); height: 100vh; display: flex; flex-direction: column; overflow: hidden; transition: 0.5s; }

        /* Role Based Themes */
        body.theme-owner { --accent: var(--p-owner); background: radial-gradient(circle at top right, #1a1600, #050505); }
        body.theme-admin { --accent: var(--p-admin); background: radial-gradient(circle at top right, #001a2e, #050505); }

        /* Login Screen */
        #auth-layer { position: fixed; inset: 0; background: #000; z-index: 9999; display: flex; align-items: center; justify-content: center; padding: 25px; }
        .login-box { background: #0a0a0a; padding: 40px 30px; border: 1px solid #1a1a1a; border-radius: 30px; width: 100%; max-width: 400px; text-align: center; box-shadow: 0 20px 50px rgba(0,0,0,0.5); }
        .login-box h1 { font-family: 'Orbitron'; font-size: 20px; letter-spacing: 4px; margin-bottom: 30px; color: #fff; }

        /* UI Elements */
        header { padding: 20px; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid rgba(255,255,255,0.05); }
        .brand-name { font-family: 'Orbitron'; font-weight: 800; color: var(--accent); text-shadow: 0 0 15px var(--accent); font-size: 14px; }
        
        nav { display: flex; overflow-x: auto; background: rgba(0,0,0,0.3); border-bottom: 1px solid rgba(255,255,255,0.05); scrollbar-width: none; }
        .nav-item { padding: 18px 25px; font-size: 10px; font-weight: 600; text-transform: uppercase; color: #666; cursor: pointer; transition: 0.3s; white-space: nowrap; }
        .nav-item.active { color: var(--accent); border-bottom: 2px solid var(--accent); background: rgba(255,255,255,0.02); }

        main { flex: 1; overflow-y: auto; padding: 20px; padding-bottom: 100px; }
        .page { display: none; max-width: 1100px; margin: 0 auto; animation: slideIn 0.4s ease; }
        .page.active { display: block; }
        @keyframes slideIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        .card { background: var(--card); border: 1px solid rgba(255,255,255,0.05); padding: 20px; border-radius: 20px; margin-bottom: 15px; position: relative; overflow: hidden; }
        .card::before { content: ''; position: absolute; top: 0; left: 0; width: 4px; height: 100%; background: var(--accent); opacity: 0.5; }

        label { display: block; font-size: 10px; color: #555; text-transform: uppercase; margin-bottom: 8px; font-weight: 700; letter-spacing: 1px; }
        input, select, textarea { width: 100%; background: #000; border: 1px solid #1a1a1a; padding: 15px; color: #fff; border-radius: 12px; margin-bottom: 12px; font-size: 14px; outline: none; transition: 0.3s; }
        input:focus { border-color: var(--accent); box-shadow: 0 0 10px rgba(var(--accent), 0.2); }

        .btn { background: var(--accent); color: #000; border: none; padding: 16px; border-radius: 12px; font-weight: 800; font-family: 'Orbitron'; font-size: 11px; cursor: pointer; width: 100%; transition: 0.3s; }
        .btn:active { transform: scale(0.96); }
        .theme-admin .btn { color: #fff; }

        /* Log Screen */
        .logs-container { background: #000; height: 400px; border-radius: 15px; overflow-y: auto; padding: 15px; border: 1px solid #111; font-family: monospace; font-size: 11px; }
        .log-line { padding: 6px 0; border-bottom: 1px solid #080808; line-height: 1.4; color: #888; }
        .log-line b { color: var(--accent); }

        /* Roles restricted UI */
        .owner-only { display: none; }

        @media (max-width: 768px) {
            nav { position: fixed; bottom: 0; left: 0; right: 0; z-index: 1000; background: #080808; border-top: 1px solid #1a1a1a; }
            .nav-item { flex: 1; text-align: center; padding: 15px 5px; font-size: 8px; }
            main { padding-bottom: 80px; }
        }
    </style>
</head>
<body>

    <div id="auth-layer">
        <div class="login-box">
            <h1>GLIDOX CORE</h1>
            <input type="text" id="login-u" placeholder="İstifadəçi adı">
            <input type="password" id="login-p" placeholder="Məxfi şifrə">
            <button class="btn" onclick="checkAccess()">GİRİŞ EDİN</button>
        </div>
    </div>

    <header>
        <div class="brand-name" id="panel-title">GLIDOX LOADING...</div>
        <div id="role-tag" style="font-size:9px; background: rgba(255,255,255,0.05); padding: 5px 10px; border-radius: 50px;">OFLINE</div>
    </header>

    <nav>
        <div class="nav-item active" onclick="showTab('dash', event)">Dashboard</div>
        <div class="nav-item" onclick="showTab('prices', event)">Qiymətlər</div>
        <div class="nav-item" onclick="showTab('promo', event)">Promo</div>
        <div class="nav-item" onclick="showTab('ann', event)">Duyuru</div>
        <div class="nav-item owner-only" id="log-tab" onclick="showTab('logs', event)">Sistem Loqları</div>
    </nav>

    <main>
        <section id="dash" class="page active">
            <div class="card">
                <h2 style="font-family:'Orbitron'; font-size:18px;">Xoş gəldiniz, <span id="u-display" style="color:var(--accent)">...</span></h2>
                <p style="font-size:12px; color:#555; margin-top:5px;">Sistem statusu: <span style="color:#00ff88">Stabil</span></p>
            </div>
            <div class="grid" style="display:grid; grid-template-columns: 1fr 1fr; gap:10px;">
                <div class="card"><label>Aktivlik</label><div id="time">--:--</div></div>
                <div class="card owner-only"><label>Bazaya Giriş</label><div style="color:var(--p-owner)">Tam Yetki</div></div>
            </div>
        </section>

        <section id="prices" class="page">
            <div class="card">
                <label>Oyun Seçin</label>
                <select id="game-picker" onchange="fetchGamePrices(this.value)"></select>
            </div>
            <div id="price-grid" style="display:grid; grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); gap:15px;"></div>
        </section>

        <section id="promo" class="page">
            <div class="card">
                <label>Yeni Promokod</label>
                <input type="text" id="p-code" placeholder="Məs: YAY2026">
                <input type="number" id="p-val" placeholder="Endirim %">
                <button class="btn" onclick="addPromo()">KODU YARAT</button>
            </div>
            <div id="promo-list"></div>
        </section>

        <section id="ann" class="page">
            <div class="card">
                <label>Sayt Mesajı</label>
                <textarea id="ann-msg" rows="5" placeholder="Bura nə yazsanız saytda görünəcək..."></textarea>
                <button class="btn" onclick="updateAnn()">YENİLƏ</button>
            </div>
        </section>

        <section id="logs" class="page">
            <div class="logs-container" id="log-output"></div>
            <button class="btn owner-only" style="margin-top:15px; background:#111; color:red;" onclick="clearSystemLogs()">BÜTÜN LOQLARI TƏMİZLƏ</button>
        </section>
    </main>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getDatabase, ref, set, get, onValue, push, remove } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

        const fConfig = {
            apiKey: "IzaSyCGsCjbwh6P7fHepdHrSyykpSAEmg0RmO8", 
            databaseURL: "https://glidoxshop-default-rtdb.europe-west1.firebasedatabase.app",
            projectId: "glidoxshop"
        };

        const app = initializeApp(fConfig);
        const db = getDatabase(app);
        let session = { u: "", p: "", role: "" };
        const games = ["roblox", "pubg", "mlbb", "valorantTR", "valorantEU", "steambalans", "applebalans", "freefire", "discord", "weplay", "standoff", "deltaforce"];

        window.checkAccess = async () => {
            const u = document.getElementById('login-u').value;
            const p = document.getElementById('login-p').value;
            
            try {
                // Təhlükəsizlik yoxlaması
                const secSnap = await get(ref(db, 'security'));
                const secData = secSnap.val();
                
                if(p === secData.owner_pass) {
                    session.role = "owner";
                } else if(p === secData.admin_pass) {
                    session.role = "admin";
                } else {
                    throw new Error("Wrong Pass");
                }

                session.u = u; session.p = p;
                setupPanel();
                logAction("Panelə giriş etdi");
            } catch (e) {
                alert("Giriş rədd edildi: Şifrə yanlışdır!");
            }
        };

        function setupPanel() {
            document.getElementById('auth-layer').style.opacity = "0";
            setTimeout(() => document.getElementById('auth-layer').remove(), 500);

            document.body.className = `theme-${session.role}`;
            document.getElementById('u-display').innerText = session.u;
            document.getElementById('role-tag').innerText = session.role.toUpperCase();
            
            if(session.role === 'owner') {
                document.getElementById('panel-title').innerText = "GLIDOX OWNER CENTRAL";
                document.querySelectorAll('.owner-only').forEach(el => el.style.display = 'block');
            } else {
                document.getElementById('panel-title').innerText = "GLIDOX ADMIN 2.5";
            }

            document.getElementById('time').innerText = new Date().toLocaleTimeString();
            loadEngine();
        }

        function logAction(msg) {
            push(ref(db, 'logs'), { u: session.u, r: session.role, a: msg, t: new Date().toLocaleString(), auth: session.p });
        }

        function loadEngine() {
            const picker = document.getElementById('game-picker');
            picker.innerHTML = games.map(g => `<option value="${g}">${g.toUpperCase()}</option>`).join('');
            fetchGamePrices(games[0]);

            // Promocodes Sync
            onValue(ref(db, 'promocodes'), s => {
                const out = document.getElementById('promo-list'); out.innerHTML = "";
                s.forEach(c => {
                    out.innerHTML += `<div class="card" style="display:flex; justify-content:space-between; align-items:center;">
                        <b>${c.key}</b> <span>${c.val().percent}% <button onclick="delData('promocodes/${c.key}')" style="color:red; background:none; border:none; margin-left:15px;">SİL</button></span>
                    </div>`;
                });
            });

            // Logs Sync (Only for Owner)
            if(session.role === 'owner') {
                onValue(ref(db, 'logs'), s => {
                    const out = document.getElementById('log-output'); out.innerHTML = "";
                    let lines = []; s.forEach(c => { if(c.val().u) lines.push(c.val()); });
                    lines.reverse().slice(0, 100).forEach(l => {
                        out.innerHTML += `<div class="log-line"><span>[${l.t}]</span> <b>${l.u}</b> (${l.r}): ${l.a}</div>`;
                    });
                });
            }
        }

        window.fetchGamePrices = (g) => {
            onValue(ref(db, `prices/${g}`), s => {
                const out = document.getElementById('price-grid'); out.innerHTML = "";
                const data = s.val() || {};
                Object.keys(data).forEach(k => {
                    if(k === 'auth') return;
                    const val = (typeof data[k] === 'object') ? data[k].val : data[k];
                    out.innerHTML += `<div class="card"><label>${k}</label><input type="text" id="p-${g}-${k}" value="${val}"><button class="btn" onclick="saveP('${g}','${k}')">Yadda Saxla</button></div>`;
                });
            });
        };

        window.saveP = (g, k) => {
            const v = document.getElementById(`p-${g}-${k}`).value;
            set(ref(db, `prices/${g}/${k}`), { val: v, auth: session.p }).then(() => {
                logAction(`${g} -> ${k} qiymətini ${v} etdi`);
                alert("Yeniləndi!");
            });
        };

        window.addPromo = () => {
            const c = document.getElementById('p-code').value;
            const v = document.getElementById('p-val').value;
            set(ref(db, `promocodes/${c}`), { percent: v, auth: session.p }).then(() => logAction(`Yeni promo: ${c}`));
        };

        window.updateAnn = () => {
            const m = document.getElementById('ann-msg').value;
            set(ref(db, 'announcement'), { msg: m, auth: session.p }).then(() => {
                alert("Duyuru Yayındadır!"); logAction("Duyurunu dəyişdi");
            });
        };

        window.delData = (path) => { if(confirm("Silmək istəyirsiz?")) remove(ref(db, path)); };
        
        window.clearSystemLogs = () => {
            if(confirm("DİQQƏT: Bütün loqlar silinsin?")) {
                set(ref(db, 'logs'), { auth: session.p });
            }
        };

        window.showTab = (id, e) => {
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
            document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
            document.getElementById(id).classList.add('active');
            e.target.classList.add('active');
        };
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="az">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Glidox Ultimate v8.0 | Management System</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root { 
            --primary: #ff4655; 
            --bg: #050505; 
            --card: #0c0c0c; 
            --text: #ffffff; 
            --green: #00ff88; 
            --gold: #ffd700; 
            --accent: #1a1a1a;
            --danger: #ff3333;
            --admin-color: #00bfff;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Poppins', sans-serif; -webkit-tap-highlight-color: transparent; }
        body { background: var(--bg); color: var(--text); height: 100vh; overflow: hidden; display: flex; flex-direction: column; }

        /* Login Layer */
        #auth-screen { position: fixed; inset: 0; background: radial-gradient(circle, #111 0%, #000 100%); z-index: 10000; display: flex; align-items: center; justify-content: center; padding: 20px; transition: 0.5s; }
        .auth-card { background: #080808; padding: 40px 30px; border: 1px solid var(--accent); border-radius: 30px; width: 100%; max-width: 420px; text-align: center; box-shadow: 0 0 80px rgba(0,0,0,1); }
        .auth-card h1 { font-family: 'Orbitron'; color: var(--primary); font-size: 24px; margin-bottom: 30px; letter-spacing: 5px; }

        /* Header */
        header { background: #000; border-bottom: 1px solid var(--accent); padding: 15px 20px; display: flex; justify-content: space-between; align-items: center; }
        .logo { font-family: 'Orbitron'; font-size: 14px; color: var(--primary); letter-spacing: 2px; }
        .user-status { font-size: 10px; font-weight: bold; padding: 5px 12px; border-radius: 5px; text-transform: uppercase; }
        .role-owner { background: rgba(255, 215, 0, 0.1); color: var(--gold); border: 1px solid var(--gold); }
        .role-admin { background: rgba(0, 191, 255, 0.1); color: var(--admin-color); border: 1px solid var(--admin-color); }

        /* Navbar */
        nav { background: #070707; display: flex; overflow-x: auto; border-bottom: 1px solid var(--accent); scrollbar-width: none; }
        nav::-webkit-scrollbar { display: none; }
        .nav-link { padding: 18px 22px; color: #555; cursor: pointer; font-size: 11px; font-weight: 600; text-transform: uppercase; white-space: nowrap; border-bottom: 3px solid transparent; transition: 0.3s; }
        .nav-link.active { color: var(--text); border-bottom-color: var(--primary); background: linear-gradient(to top, rgba(255, 70, 85, 0.1), transparent); }

        /* Main Context */
        main { flex: 1; overflow-y: auto; padding: 20px; -webkit-overflow-scrolling: touch; }
        .section { display: none; max-width: 1200px; margin: 0 auto; animation: fadeInUp 0.4s ease-out; }
        .section.active { display: block; }
        @keyframes fadeInUp { from { opacity: 0; transform: translateY(15px); } to { opacity: 1; transform: translateY(0); } }

        /* UI Cards */
        .card { background: var(--card); border: 1px solid var(--accent); padding: 25px; border-radius: 20px; margin-bottom: 20px; }
        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 15px; }

        /* Forms */
        label { display: block; font-size: 10px; color: #555; text-transform: uppercase; margin-bottom: 8px; font-weight: bold; }
        input, select, textarea { width: 100%; background: #000; border: 1px solid #222; padding: 16px; color: #fff; border-radius: 12px; font-size: 14px; outline: none; transition: 0.3s; margin-bottom: 10px; }
        input:focus { border-color: var(--primary); background: #040404; }
        
        .btn { background: var(--primary); color: #fff; border: none; padding: 18px; border-radius: 12px; font-weight: bold; cursor: pointer; font-family: 'Orbitron'; font-size: 12px; transition: 0.3s; width: 100%; }
        .btn:active { transform: scale(0.97); }
        .btn-danger { background: var(--danger); }
        .btn-outline { background: transparent; border: 1px solid #333; color: #888; }

        /* Logs */
        .log-screen { background: #000; border: 1px solid #111; border-radius: 15px; height: 400px; overflow-y: auto; padding: 15px; font-family: monospace; font-size: 12px; }
        .log-line { padding: 8px 0; border-bottom: 1px solid #080808; line-height: 1.5; }
        .log-time { color: #444; margin-right: 8px; }
        .log-admin { color: var(--primary); font-weight: bold; }
        .log-owner { color: var(--gold); font-weight: bold; }

        /* Mobile Adjustments */
        @media (max-width: 768px) {
            header { padding: 15px; }
            nav { position: fixed; bottom: 0; left: 0; right: 0; z-index: 1000; background: #000; border-top: 1px solid var(--accent); border-bottom: none; }
            .nav-link { flex: 1; text-align: center; padding: 15px 5px; font-size: 9px; }
            main { padding-bottom: 100px; }
            .grid { grid-template-columns: 1fr; }
        }

        /* Access Control Classes */
        .owner-only { display: none; }
    </style>
</head>
<body>

    <div id="auth-screen">
        <div class="auth-card">
            <h1>GLIDOX CORE</h1>
            <input type="text" id="login-name" placeholder="Adınız">
            <input type="password" id="login-pass" placeholder="Məxfi Şifrə">
            <button class="btn" onclick="handleLogin()">GİRİŞ ET</button>
        </div>
    </div>

    <header>
        <div class="logo">GLIDOX V8.0</div>
        <div id="role-display" class="user-status">YÜKLƏNİR...</div>
    </header>

    <nav>
        <div class="nav-link active" onclick="switchTab('dash', event)">📊 Dash</div>
        <div class="nav-link" onclick="switchTab('prices', event)">💎 Qiymətlər</div>
        <div class="nav-link" onclick="switchTab('promo', event)">🎟️ Promo</div>
        <div class="nav-link" onclick="switchTab('ann', event)">📢 Duyuru</div>
        <div class="nav-link" onclick="switchTab('bl', event)">🚫 Blacklist</div>
        <div class="nav-link owner-only" id="logs-tab" onclick="switchTab('logs', event)">📜 Loqlar</div>
    </nav>

    <main>
        <section id="dash" class="section active">
            <div class="card">
                <h2 style="font-family:'Orbitron'; font-size:18px;">Salam, <span id="display-name" style="color:var(--primary)">...</span></h2>
                <p style="color:#555; font-size:12px; margin-top:5px;">Səlahiyyət səviyyənizə uyğun panel yükləndi.</p>
            </div>
            <div class="grid">
                <div class="card"><label>Sistem Statusu</label><h3 style="color:var(--green)">ONLİNE</h3></div>
                <div class="card"><label>Giriş Vaxtı</label><h3 id="time-display" style="font-size:14px;">--:--</h3></div>
            </div>
        </section>

        <section id="prices" class="section">
            <div id="game-selector" style="display:flex; overflow-x:auto; gap:10px; margin-bottom:20px; padding-bottom:10px;"></div>
            <div id="price-list" class="grid"></div>
        </section>

        <section id="promo" class="section">
            <div class="card">
                <label>Yeni Promokod</label>
                <div style="display:flex; gap:10px;">
                    <input type="text" id="promo-code" placeholder="KOD">
                    <input type="number" id="promo-perc" placeholder="%" style="width:100px">
                </div>
                <button class="btn" onclick="actionPromo()">YARAT</button>
            </div>
            <div id="promo-display" class="grid"></div>
        </section>

        <section id="ann" class="section">
            <div class="card">
                <label>Sayt Bildirişi</label>
                <textarea id="ann-msg" rows="5" placeholder="Bura yazılan mesaj saytın yuxarısında görünəcək..."></textarea>
                <label>Status</label>
                <select id="ann-stat">
                    <option value="active">AKTİV</option>
                    <option value="inactive">DEAKTİV</option>
                </select>
                <button class="btn" onclick="actionAnn()">DUYURUNU YENİLƏ</button>
            </div>
        </section>

        <section id="bl" class="section">
            <div class="card">
                <label>Qara Siyahı (ID və ya IP)</label>
                <input type="text" id="bl-val" placeholder="0.0.0.0">
                <button class="btn btn-danger" onclick="actionBL()">BLOKLA</button>
            </div>
            <div id="bl-display" class="grid"></div>
        </section>

        <section id="logs" class="section">
            <div class="log-screen" id="log-content"></div>
            <button class="btn btn-outline" style="margin-top:10px;" onclick="actionClearLogs()">BÜTÜN LOQLARI SİL</button>
        </section>
    </main>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getDatabase, ref, set, get, onValue, push, remove } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

        const firebaseConfig = {
            apiKey: "IzaSyCGsCjbwh6P7fHepdHrSyykpSAEmg0RmO8", 
            databaseURL: "https://glidoxshop-default-rtdb.europe-west1.firebasedatabase.app",
            projectId: "glidoxshop",
            appId: "1:123258254071:web:ae147159986886134a59f2"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        let user = { name: "", role: "", pass: "" };
        const games = ["roblox", "pubg", "mlbb", "valorantTR", "valorantEU", "steambalans", "applebalans", "freefire", "discord", "weplay", "standoff", "deltaforce"];

        // LOGIN ENGINE
        window.handleLogin = async () => {
            const n = document.getElementById('login-name').value;
            const p = document.getElementById('login-pass').value;

            try {
                // Şifrə yoxlama (Security bölməsi bağlı olduğu üçün qiymət yazmağı test edirik)
                const checkRef = ref(db, 'prices/roblox/auth_test');
                await set(checkRef, { val: "test", auth: p });
                
                // Şifrə düzdürsə bura keçir
                user.name = n;
                user.pass = p;
                
                // Rolu təyin etmək üçün manual şifrə yoxlanışı (Owner vs Admin)
                // QEYD: Owner şifrənizi Firebase Console-da security bölməsində nə qoymusunuzsa, aşağıdakı müqayisədə istifadə edin.
                // Məsələn, əgər owner şifrəniz "9988"dirsə, bura yazın:
                if(p === "SİZİN_HƏQİQİ_OWNER_ŞİFRƏNİZ") user.role = "owner";
                else user.role = "admin";

                setupUI();
                log("Sistemə giriş etdi");
            } catch (e) {
                alert("Xəta: Giriş rədd edildi! (Şifrə yanlışdır və ya Rules köhnədir)");
            }
        };

        function setupUI() {
            document.getElementById('auth-screen').style.opacity = "0";
            setTimeout(() => document.getElementById('auth-screen').remove(), 500);
            
            document.getElementById('display-name').innerText = user.name;
            const badge = document.getElementById('role-display');
            badge.innerText = user.role;
            badge.className = `user-status role-${user.role}`;

            if(user.role === 'owner') {
                document.querySelectorAll('.owner-only').forEach(el => el.style.display = 'block');
            }

            document.getElementById('time-display').innerText = new Date().toLocaleTimeString();
            initCore();
        }

        // CORE ACTIONS
        function log(msg) {
            push(ref(db, 'logs'), {
                u: user.name,
                r: user.role,
                a: msg,
                t: new Date().toLocaleString('az-AZ'),
                auth: user.pass
            });
        }

        function initCore() {
            // Price Chips
            const chipContainer = document.getElementById('game-selector');
            chipContainer.innerHTML = games.map(g => `<div class="game-chip" style="padding:10px 20px; background:#111; border-radius:50px; cursor:pointer; font-size:10px; border:1px solid #222;" onclick="loadPrices('${g}')">${g.toUpperCase()}</div>`).join('');
            loadPrices('roblox');

            // Promos
            onValue(ref(db, 'promocodes'), snap => {
                const box = document.getElementById('promo-display'); box.innerHTML = "";
                snap.forEach(p => {
                    box.innerHTML += `<div class="card" style="display:flex; justify-content:space-between;"><b>${p.key}</b> <span>${p.val().percent}% <button onclick="delItem('promocodes/${p.key}')" style="background:none; border:none; color:red; margin-left:10px;">X</button></span></div>`;
                });
            });

            // Blacklist
            onValue(ref(db, 'blacklist'), snap => {
                const box = document.getElementById('bl-display'); box.innerHTML = "";
                snap.forEach(b => {
                    box.innerHTML += `<div class="card" style="display:flex; justify-content:space-between;"><span>${b.val().d}</span> <button onclick="delItem('blacklist/${b.key}')" style="background:none; border:none; color:red;">SİL</button></div>`;
                });
            });

            // Logs
            onValue(ref(db, 'logs'), snap => {
                const box = document.getElementById('log-content'); box.innerHTML = "";
                const data = [];
                snap.forEach(l => data.push(l.val()));
                data.reverse().forEach(d => {
                    box.innerHTML += `<div class="log-line"><span class="log-time">[${d.t}]</span> <span class="log-${d.r}">${d.u}</span>: ${d.a}</div>`;
                });
            });
        }

        window.loadPrices = (game) => {
            onValue(ref(db, `prices/${game}`), snap => {
                const list = document.getElementById('price-list'); list.innerHTML = "";
                const data = snap.val() || {};
                Object.keys(data).forEach(k => {
                    if(k === 'auth_test' || k === 'auth') return;
                    const val = (typeof data[k] === 'object') ? data[k].val : data[k];
                    list.innerHTML += `<div class="card">
                        <label>${k}</label>
                        <input type="text" id="pr-${game}-${k}" value="${val}">
                        <button class="btn" style="padding:10px;" onclick="updatePrice('${game}','${k}')">Yadda Saxla</button>
                    </div>`;
                });
            });
        };

        window.updatePrice = (g, k) => {
            const v = document.getElementById(`pr-${g}-${k}`).value;
            set(ref(db, `prices/${g}/${k}`), { val: v, auth: user.pass }).then(() => {
                log(`${g} -> ${k} qiymətini ${v} etdi`);
                alert("Yeniləndi!");
            });
        };

        window.actionPromo = () => {
            const c = document.getElementById('promo-code').value;
            const p = document.getElementById('promo-perc').value;
            set(ref(db, `promocodes/${c}`), { percent: p, auth: user.pass }).then(() => log(`Promo yaratdı: ${c}`));
        };

        window.actionAnn = () => {
            const m = document.getElementById('ann-msg').value;
            const s = document.getElementById('ann-stat').value;
            set(ref(db, 'announcement'), { msg: m, stat: s, auth: user.pass }).then(() => {
                log("Duyurunu yenilədi");
                alert("Duyuru Yayındadır!");
            });
        };

        window.actionBL = () => {
            const v = document.getElementById('bl-val').value;
            push(ref(db, 'blacklist'), { d: v, auth: user.pass }).then(() => log(`Blacklistə əlavə: ${v}`));
        };

        window.delItem = (path) => {
            if(confirm("Silmək istəyirsən?")) {
                remove(ref(db, path)).then(() => log(`Sildi: ${path}`));
            }
        };

        window.actionClearLogs = () => {
            if(confirm("Bütün loqlar silinsin?")) {
                set(ref(db, 'logs'), { empty: true, auth: user.pass });
            }
        };

        window.switchTab = (id, e) => {
            document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
            document.querySelectorAll('.nav-link').forEach(l => l.classList.remove('active'));
            document.getElementById(id).classList.add('active');
            e.target.classList.add('active');
        };

    </script>
</body>
</html>
